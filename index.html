<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBI-TWICE | OFFICIAL HUB</title>
    <style>
        :root {
            --brand-green: #5c8d67;
            --brand-green-bright: #7bb589;
            --bg-deep: #050505;
            --bg-card: #0a0a0a;
            --text-main: #ffffff;
            --radius-std: 15px;
            --radius-lg: 30px;
            --t-std: 0.4s;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-image: url('logo.png');
            background-repeat: repeat;
            background-size: 180px;
            background-attachment: fixed;
        }

        /* Overlay für die Dunkelheit */
        .dark-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.98) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* HEADER */
        header {
            height: 100px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--brand-green);
        }

        .header-nav { display: flex; gap: 20px; flex: 1; }
        .logo-center { flex: 1; text-align: center; }
        .logo-center h1 { 
            font-size: 32px; 
            letter-spacing: 12px; 
            text-transform: uppercase; 
            cursor: pointer;
        }

        .btn-nav {
            background: #111;
            border: 1px solid #222;
            color: #fff;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-nav.active, .btn-nav:hover {
            background: var(--brand-green);
            border-color: #fff;
        }

        .cart-badge {
            background: #fff;
            color: #000;
            padding: 2px 8px;
            border-radius: 5px;
            margin-left: 8px;
        }

        /* SECTIONS */
        .view-section { display: none; padding: 60px 5%; min-height: 80vh; }
        #view-home { display: block; }

        /* LIVE MATRIX */
        .video-matrix {
            display: grid;
            grid-template-columns: 1fr 2.5fr 1fr;
            gap: 20px;
            align-items: center;
            margin-bottom: 50px;
        }

        .video-box {
            aspect-ratio: 16/9;
            background: #000;
            border-radius: var(--radius-std);
            overflow: hidden;
            border: 1px solid #222;
        }

        .video-box.main {
            border: 3px solid var(--brand-green);
            box-shadow: 0 0 50px rgba(92, 141, 103, 0.3);
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* SHOP GRID */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid #111;
            padding: 30px;
            border-radius: var(--radius-lg);
            text-align: center;
            transition: var(--t-std);
        }

        .product-card:hover { transform: translateY(-15px); border-color: var(--brand-green); }

        .product-visual {
            height: 300px;
            background: #fff;
            border-radius: var(--radius-std);
            margin-bottom: 20px;
            display: flex;
            align-items: center; justify-content: center;
        }

        .product-visual img { max-width: 80%; max-height: 80%; object-fit: contain; }

        .price { font-size: 28px; color: var(--brand-green); font-weight: 900; display: block; margin: 15px 0; }

        .size-selector {
            width: 100%;
            padding: 15px;
            background: #000;
            color: #fff;
            border: 1px solid #333;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .buy-btn {
            width: 100%;
            padding: 18px;
            background: var(--brand-green);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* CART */
        .cart-container {
            max-width: 1200px;
            margin: 0 auto;
            background: #080808;
            border-radius: var(--radius-lg);
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            overflow: hidden;
        }

        .cart-items { padding: 50px; border-right: 1px solid #111; }
        .checkout-side { padding: 50px; background: #050505; }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid #111;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid #222;
            color: #fff;
            border-radius: 10px;
        }

        /* FOOTER */
        footer {
            padding: 100px 5%;
            text-align: center;
            border-top: 1px solid #111;
            margin-top: 50px;
        }

        .footer-logo { font-size: 50px; font-weight: 900; opacity: 0.1; letter-spacing: 20px; }
    </style>
</head>
<body>

    <div class="dark-overlay"></div>

    <header>
        <div class="header-nav">
            <button class="btn-nav active" id="nav-home" onclick="engine.changeView('home')">Live</button>
            <button class="btn-nav" id="nav-shop" onclick="engine.changeView('shop')">Store</button>
        </div>
        <div class="logo-center">
            <h1 onclick="engine.changeView('home')">ROBI-TWICE</h1>
        </div>
        <div class="header-nav" style="justify-content: flex-end;">
            <button class="btn-nav" onclick="engine.changeView('cart')">
                Cart <span class="cart-badge" id="cart-count">0</span>
            </button>
        </div>
    </header>

    <main id="view-home" class="view-section">
        <div class="video-matrix">
            <div class="video-box"><iframe src="https://www.youtube.com/embed/5Mf7S0pDyP0?mute=1&autoplay=1&loop=1"></iframe></div>
            <div class="video-box main"><iframe src="https://www.youtube.com/embed/live_stream?channel=UCu1ZS9PqAJDStOS5EJiycEQ&autoplay=1&mute=1"></iframe></div>
            <div class="video-box"><iframe src="https://www.youtube.com/embed/vvj64ZskM9Y?mute=1&autoplay=1&loop=1"></iframe></div>
        </div>
    </main>

    <main id="view-shop" class="view-section">
        <div class="product-grid">
            <div class="product-card">
                <div class="product-visual"><img src="tshirt.png" alt="Shirt"></div>
                <h3>Signature Tee</h3>
                <span class="price">29,95 €</span>
                <select id="size-1" class="size-selector"><option>S</option><option>M</option><option>L</option></select>
                <button class="buy-btn" onclick="engine.addToCart('Signature Tee', 29.95, 'size-1')">Add to Cart</button>
            </div>
            <div class="product-card">
                <div class="product-visual"><img src="hoodie.png" alt="Hoodie"></div>
                <h3>Legacy Hoodie</h3>
                <span class="price">54,95 €</span>
                <select id="size-2" class="size-selector"><option>S</option><option>M</option><option>L</option></select>
                <button class="buy-btn" onclick="engine.addToCart('Legacy Hoodie', 54.95, 'size-2')">Add to Cart</button>
            </div>
        </div>
    </main>

    <main id="view-cart" class="view-section">
        <div class="cart-container">
            <div class="cart-items">
                <h2>Your Items</h2>
                <div id="cart-list"></div>
                <h3 style="margin-top: 30px;">Total: <span id="cart-total">0,00 €</span></h3>
            </div>
            <div class="checkout-side">
                <h2>Checkout</h2>
                <form id="checkout-form">
                    <input type="text" name="name" class="input-field" placeholder="Full Name" required>
                    <input type="text" name="address" class="input-field" placeholder="Shipping Address" required>
                    <input type="email" name="email" class="input-field" placeholder="Email" required>
                    <input type="hidden" name="order_items" id="hidden-items">
                    <button type="submit" class="buy-btn" style="background: #fff; color: #000;">Pay with PayPal</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-logo">ROBI-TWICE</div>
        <p>&copy; 2026 ROBI-TWICE OFFICIAL. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        const engine = {
            state: { cart: [] },

            changeView: (viewId) => {
                document.querySelectorAll('.view-section').forEach(v => v.style.display = 'none');
                document.getElementById('view-' + viewId).style.display = 'block';
                document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
                if(document.getElementById('nav-'+viewId)) document.getElementById('nav-'+viewId).classList.add('active');
            },

            addToCart: (name, price, sizeId) => {
                const size = document.getElementById(sizeId).value;
                engine.state.cart.push({ name, price, size, id: Date.now() });
                engine.updateUI();
            },

            updateUI: () => {
                const list = document.getElementById('cart-list');
                const count = document.getElementById('cart-count');
                const total = document.getElementById('cart-total');
                
                count.innerText = engine.state.cart.length;
                let html = "";
                let sum = 0;

                engine.state.cart.forEach(item => {
                    sum += item.price;
                    html += `<div class="cart-item-row">
                        <span>${item.name} (${item.size})</span>
                        <span>${item.price.toFixed(2)} €</span>
                    </div>`;
                });

                list.innerHTML = html || "Cart is empty";
                total.innerText = sum.toFixed(2).replace('.', ',') + " €";
                document.getElementById('hidden-items').value = JSON.stringify(engine.state.cart);
            }
        };

        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(engine.state.cart.length === 0) return alert("Empty cart!");
            
            const formData = new FormData(e.target);
            // Formspree ID hier einfügen
            await fetch('https://formspree.io/f/xlgpdoak', {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            });

            const total = engine.state.cart.reduce((a, b) => a + b.price, 0).toFixed(2);
            window.location.href = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=bananielheinrich@gmail.com&amount=${total}&currency_code=EUR&item_name=robi-twice-order`;
        });
    </script>
</body>
</html>
