<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robi-twice | Live & Shop</title>
    <style>
        /* --- DESIGN & HINTERGRUND --- */
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; background-color: #000; color: #fff; overflow-x: hidden;
            background-image: url('logo.png'); background-repeat: repeat; 
            background-position: center; background-size: 150px; background-attachment: fixed;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.88); z-index: -1;
        }

        header { 
            background-color: #1a1a1a; padding: 15px 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #5c8d67; 
        }

        .nav-btn { 
            background-color: #333; color: white; padding: 8px 18px; 
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold; 
            transition: 0.3s;
        }
        .nav-btn:hover { background-color: #5c8d67; }

        .logo-nav { 
            font-size: 24px; font-weight: bold; cursor: pointer; 
            position: absolute; left: 50%; transform: translateX(-50%); 
        }

        /* --- VIDEO LAYOUT (3 KÄSTCHEN) --- */
        .video-container-main { 
            display: flex; justify-content: center; align-items: center; 
            gap: 20px; max-width: 1400px; margin: 30px auto; flex-wrap: wrap; 
            padding: 0 20px;
        }
        
        .side-video-box { 
            flex: 1; min-width: 280px; max-width: 350px; aspect-ratio: 16/9; 
            background: #111; border: 2px solid #444; border-radius: 12px; 
            overflow: hidden; box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); 
            transition: 0.3s;
        }
        .side-video-box:hover { transform: scale(1.03); border-color: #fff; }

        .main-stream-center { 
            flex: 2; min-width: 320px; max-width: 850px; aspect-ratio: 16/9; 
            border: 3px solid #5c8d67; border-radius: 12px; overflow: hidden; 
            position: relative; animation: live-glow 2s infinite alternate;
        }

        @keyframes live-glow {
            from { box-shadow: 0 0 10px rgba(92, 141, 103, 0.3); }
            to { box-shadow: 0 0 30px rgba(92, 141, 103, 0.8); }
        }

        /* NEON OFFLINE OVERLAY */
        #offline-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 10; display: none; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
        }
        .neon-text {
            color: #fff; text-shadow: 0 0 10px #5c8d67, 0 0 20px #5c8d67, 0 0 40px #5c8d67;
            font-size: 1.6rem; font-weight: bold; text-transform: uppercase;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* --- SHOP & SECTIONS --- */
        .page-section { display: none; padding: 40px 5%; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: rgba(26, 26, 26, 0.95); border-radius: 12px; border: 1px solid #333; padding-bottom: 20px; text-align: center; overflow: hidden; }
        .product-image { width: 100%; height: 300px; object-fit: contain; background: #fff; }
        
        .price { font-size: 22px; color: #5c8d67; font-weight: bold; display: block; margin: 10px 0; }
        .cart-count { background: #5c8d67; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px; }

        /* Mobil-Anpassung */
        @media (max-width: 1000px) {
            .side-video-box { max-width: 100%; width: 100%; flex: none; }
            .main-stream-center { order: -1; width: 100%; flex: none; }
        }
    </style>
</head>
<body>

    <header>
        <button class="nav-btn" onclick="showSection('home')">🏠 LIVE</button>
        <div class="logo-nav" onclick="showSection('home')">robi-twice</div>
        <div>
            <button class="nav-btn" onclick="showSection('support')">SUPPORT</button>
            <button class="nav-btn" onclick="showSection('cart')">🛒 <span id="cart-counter" class="cart-count">0</span></button>
        </div>
    </header>

    <section id="home" class="page-section active">
        <h1 style="text-align: center; color: #5c8d67;">LATEST CONTENT</h1>
        <div class="video-container-main">
            <div class="side-video-box" id="vid-1"><p style="text-align:center; padding-top:20%;">Suche Video 1...</p></div>
            
            <div class="main-stream-center">
                <iframe id="live-iframe" src="https://www.youtube.com/embed/live_stream?channel=UCm8u2eBf67RCH16p2oA9uSQ" allowfullscreen></iframe>
                <div id="offline-overlay">
                    <div class="neon-text">🔴 robi-twice</div>
                    <div class="neon-text">streamt gerade nicht</div>
                </div>
            </div>

            <div class="side-video-box" id="vid-2"><p style="text-align:center; padding-top:20%;">Suche Video 2...</p></div>
        </div>
    </section>

    <section id="support" class="page-section">
        <div style="max-width: 500px; margin: auto; background: rgba(26,26,26,0.9); padding: 30px; border-radius: 12px;">
            <h2 style="text-align:center;">Support</h2>
            <input type="email" id="s-email" placeholder="Deine E-Mail" style="width:100%; padding:10px; margin:10px 0; background:#000; color:#fff; border:1px solid #444;">
            <textarea id="s-msg" rows="5" placeholder="Nachricht" style="width:100%; padding:10px; margin:10px 0; background:#000; color:#fff; border:1px solid #444;"></textarea>
            <button class="nav-btn" style="width:100%; background:#5c8d67;" onclick="sendSupport()">ABSCHICKEN</button>
            <p id="s-status" style="text-align:center; margin-top:10px;"></p>
        </div>
    </section>

    <section id="cart" class="page-section">
        <div style="max-width: 600px; margin: auto; background: rgba(26,26,26,0.9); padding: 20px; border-radius: 12px;">
            <h2>Dein Warenkorb</h2>
            <ul id="cart-list" style="list-style:none; padding:0;"></ul>
            <h3 id="cart-total">Gesamt: 0,00 €</h3>
            <a id="paypal-link" href="#" style="display:block; background:#0070ba; color:white; padding:15px; border-radius:30px; text-decoration:none; text-align:center; font-weight:bold;">PayPal Checkout</a>
        </div>
    </section>

    <script>
        let cart = [];

        function showSection(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- YOUTUBE AUTOMATIK ---
        async function loadVideos() {
            const channelId = "UCm8u2eBf67RCH16p2oA9uSQ";
            const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
            const apiUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                const parser = new DOMParser();
                const xml = parser.parseFromString(data.contents, "text/xml");
                const entries = xml.getElementsByTagName("entry");

                if (entries.length >= 2) {
                    const id1 = entries[0].getElementsByTagName("yt:videoId")[0].textContent;
                    const id2 = entries[1].getElementsByTagName("yt:videoId")[0].textContent;

                    document.getElementById('vid-1').innerHTML = `<iframe src="https://www.youtube.com/embed/${id1}" allowfullscreen></iframe>`;
                    document.getElementById('vid-2').innerHTML = `<iframe src="https://www.youtube.com/embed/${id2}" allowfullscreen></iframe>`;

                    // Live-Check: Wenn das neueste Video "live" im Titel hat
                    const title = entries[0].getElementsByTagName("title")[0].textContent.toLowerCase();
                    if(title.includes("live") || title.includes("streaming")) {
                        document.getElementById('offline-overlay').style.display = 'none';
                    } else {
                        document.getElementById('offline-overlay').style.display = 'flex';
                    }
                }
            } catch (e) {
                console.error("Fehler beim Laden", e);
                document.getElementById('offline-overlay').style.display = 'flex';
            }
        }

        // --- SUPPORT FUNKTION ---
        async function sendSupport() {
            const status = document.getElementById('s-status');
            status.innerText = "Sende...";
            const res = await fetch("https://formspree.io/f/xlgpdoak", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: document.getElementById('s-email').value, msg: document.getElementById('s-msg').value })
            });
            if(res.ok) {
                status.innerText = "Gesendet! Wir melden uns.";
                status.style.color = "#5c8d67";
            }
        }

        window.onload = loadVideos;
    </script>
</body>
</html>
