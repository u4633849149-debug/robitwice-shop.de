<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robi-twice | Official Merch & Live Entertainment</title>
    
    <style>
        /* --- GRUNDLEGENDES SETUP --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #000; 
            color: #fff; 
            overflow-x: hidden;
            background-image: url('logo.png'); 
            background-repeat: repeat; 
            background-position: center; 
            background-size: 160px; 
            background-attachment: fixed;
            line-height: 1.6;
        }
        
        /* Dunkles Overlay für Kontrast */
        body::before {
            content: ""; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background-color: rgba(0, 0, 0, 0.94); 
            z-index: -1;
        }

        /* --- NAVIGATION (HEADER) --- */
        header { 
            background-color: #111; 
            padding: 25px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 2px solid #5c8d67;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }
        
        .nav-button-container {
            display: flex;
            gap: 20px;
        }

        .logo-nav { 
            font-size: 34px; 
            font-weight: 900; 
            cursor: pointer; 
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%);
            text-shadow: 0 0 20px #5c8d67; 
            letter-spacing: 4px; 
            text-transform: uppercase;
        }

        .nav-btn { 
            background-color: #1a1a1a; 
            color: white; 
            padding: 14px 28px; 
            border: 1px solid #333; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.3s ease; 
            font-size: 13px;
            text-transform: uppercase;
        }
        
        .nav-btn:hover { 
            background-color: #5c8d67; 
            border-color: #fff; 
            transform: translateY(-4px);
            box-shadow: 0 5px 15px rgba(92, 141, 103, 0.4);
        }

        /* --- VIDEO AREA --- */
        .video-section-container {
            padding: 60px 0;
        }

        .video-wrapper { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 35px; 
            max-width: 1600px; 
            margin: 0 auto; 
            flex-wrap: wrap; 
            padding: 0 40px;
        }
        
        .side-vid { 
            flex: 1; 
            min-width: 320px; 
            max-width: 420px; 
            aspect-ratio: 16/9; 
            background: #050505; 
            border: 2px solid #222; 
            border-radius: 18px; 
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        
        .main-stream { 
            flex: 2; 
            min-width: 400px; 
            max-width: 950px; 
            aspect-ratio: 16/9; 
            border: 3px solid #5c8d67; 
            border-radius: 25px; 
            overflow: hidden; 
            position: relative; 
            animation: glow-pulse-heavy 3s infinite alternate;
        }

        @keyframes glow-pulse-heavy { 
            from { box-shadow: 0 0 20px rgba(92, 141, 103, 0.3); } 
            to { box-shadow: 0 0 55px rgba(92, 141, 103, 0.8); } 
        }
        
        #offline-overlay {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
        }
        
        .neon-msg { 
            color: #fff; 
            text-shadow: 0 0 15px #5c8d67, 0 0 40px #5c8d67; 
            font-size: 3rem; 
            font-weight: 900; 
            letter-spacing: 5px;
        }

        /* --- CONTENT SECTIONS --- */
        .page-section { 
            display: none; 
            padding: 100px 5%; 
            animation: slideInUp 0.7s ease-out; 
        }

        .active { 
            display: block; 
        }

        @keyframes slideInUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- SHOP GRID --- */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); 
            gap: 60px; 
            max-width: 1500px;
            margin: 0 auto;
        }
        
        .product-card { 
            background: rgba(20, 20, 20, 0.9); 
            border: 1px solid #333; 
            border-radius: 30px; 
            text-align: center; 
            padding-bottom: 35px; 
            transition: all 0.4s ease; 
            overflow: hidden;
        }
        
        .product-card:hover { 
            transform: translateY(-15px); 
            border-color: #5c8d67; 
        }
        
        .img-box { 
            width: 100%; 
            height: 400px; 
            background: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .img-box img { 
            max-width: 85%; 
            max-height: 85%; 
            object-fit: contain; 
        }
        
        .product-price { 
            font-size: 28px; 
            color: #5c8d67; 
            font-weight: 900; 
            margin: 15px 0; 
            display: block; 
        }

        /* --- FORMULARE (ADRESSE) --- */
        .form-container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: rgba(10, 10, 10, 0.98); 
            padding: 50px; 
            border-radius: 35px; 
            border: 2px solid #5c8d67; 
            box-shadow: 0 30px 70px rgba(0,0,0,0.9);
        }

        .form-row { 
            display: flex; 
            gap: 25px; 
            margin-bottom: 20px; 
        }

        .form-group { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            text-align: left; 
        }

        .form-group label {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            margin-left: 10px;
            text-transform: uppercase;
        }
        
        input, textarea, select { 
            width: 100%; 
            padding: 16px; 
            background: #080808; 
            color: #fff; 
            border: 1px solid #2a2a2a; 
            border-radius: 15px; 
            font-size: 16px; 
        }
        
        input:focus { 
            border-color: #5c8d67; 
            outline: none; 
        }
        
        .action-btn { 
            width: 100%; 
            padding: 22px; 
            background: #5c8d67; 
            color: #fff; 
            border: none; 
            border-radius: 40px; 
            cursor: pointer; 
            font-weight: 900; 
            text-transform: uppercase; 
            transition: 0.4s; 
            font-size: 16px;
            margin-top: 20px;
        }
        
        .action-btn:hover { 
            background-color: #4a7354; 
            transform: scale(1.03); 
        }

        .delete-item-btn {
            color: #ff4444;
            cursor: pointer;
            border: 1px solid #ff4444;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
        }

        /* --- FOOTER --- */
        footer { 
            text-align: center; 
            padding: 80px 20px; 
            color: #444; 
            border-top: 1px solid #111; 
            margin-top: 100px; 
        }

        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <header>
        <div class="nav-button-container">
            <button class="nav-btn" onclick="showSection('home')">Live & Feed</button>
            <button class="nav-btn" onclick="showSection('shop')">Merch Store</button>
        </div>
        
        <div class="logo-nav" onclick="showSection('home')">robi-twice</div>
        
        <div class="nav-button-container">
            <button class="nav-btn" onclick="showSection('support')">Support</button>
            <button class="nav-btn" onclick="showSection('cart')">
                🛒 Warenkorb (<span id="cart-count">0</span>)
            </button>
        </div>
    </header>

    <section id="home" class="page-section active">
        <div class="video-section-container">
            <div class="video-wrapper">
                <div class="side-vid" id="vid-left"></div>
                
                <div class="main-stream">
                    <iframe id="live-iframe" src="https://www.youtube.com/embed/live_stream?channel=UCu1ZS9PqAJDStOS5EJiycEQ" allowfullscreen></iframe>
                    
                    <div id="offline-overlay">
                        <div class="neon-msg">OFFLINE</div>
                        <p style="color: #444; margin-top: 15px;"></p>
                    </div>
                </div>

                <div class="side-vid" id="vid-right"></div>
            </div>
        </div>
    </section>

    <section id="shop" class="page-section">
        <h2 style="text-align:center; font-size: 40px; margin-bottom: 60px;">EXCLUSIVE MERCH</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <div class="img-box"><img src="tshirt.png"></div>
                <div style="padding: 25px;">
                    <h3>SIGNATURE T-SHIRT</h3>
                    <span class="product-price">29,90 €</span>
                    <select id="size1" style="margin-bottom: 15px;">
                        <option value="S">Größe: S</option>
                        <option value="M">Größe: M</option>
                        <option value="L">Größe: L</option>
                        <option value="XL">Größe: XL</option>
                    </select>
                    <button class="action-btn" onclick="addToCart('Signature Shirt', 29.90, 'size1')">In den Warenkorb</button>
                </div>
            </div>

            <div class="product-card">
                <div class="img-box"><img src="hoodie.png"></div>
                <div style="padding: 25px;">
                    <h3>OFFICIAL HOODIE</h3>
                    <span class="product-price">49,90 €</span>
                    <select id="size2" style="margin-bottom: 15px;">
                        <option value="M">Größe: M</option>
                        <option value="L">Größe: L</option>
                        <option value="XL">Größe: XL</option>
                    </select>
                    <button class="action-btn" onclick="addToCart('Official Hoodie', 49.90, 'size2')">In den Warenkorb</button>
                </div>
            </div>

        </div>
    </section>

    <section id="cart" class="page-section">
        <div class="form-container">
            <h2 style="margin-bottom: 30px; text-align: center;">Dein Warenkorb</h2>
            
            <div id="cart-list-items" style="margin-bottom: 30px; min-height: 50px;">
                </div>
            
            <div style="background: #000; padding: 25px; border-radius: 20px; border: 1px solid #222; margin-bottom: 40px; display: flex; justify-content: space-between;">
                <span>Gesamtsumme:</span>
                <h2 id="total-sum-display" style="color: #5c8d67;">0,00 €</h2>
            </div>

            <div id="address-section" style="display:none; border-top: 1px solid #222; padding-top: 40px;">
                <h3 style="margin-bottom: 25px; color: #5c8d67;">VERSANDADRESSE</h3>
                <form id="final-order-form">
                    <div class="form-row">
                        <div class="form-group"><label>Vorname*</label><input type="text" name="First_Name" required></div>
                        <div class="form-group"><label>Nachname*</label><input type="text" name="Last_Name" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group" style="flex:3;"><label>Straße*</label><input type="text" name="Street" required></div>
                        <div class="form-group"><label>Hausnr.*</label><input type="text" name="House" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>PLZ*</label><input type="text" name="Zip" required></div>
                        <div class="form-group"><label>Stadt*</label><input type="text" name="City" required></div>
                    </div>
                    <div class="form-group" style="margin-bottom:20px;">
                        <label>E-Mail Adresse*</label>
                        <input type="email" name="Email" required>
                    </div>
                    <input type="hidden" name="Order_Summary" id="hidden-summary">
                    <button type="submit" id="checkout-btn" class="action-btn">JETZT SICHER BEZAHLEN</button>
                </form>
            </div>
            
            <button id="show-address-btn" class="action-btn" onclick="openAddressForm()">ZUR KASSE GEHEN</button>
        </div>
    </section>

    <section id="support" class="page-section">
        <div class="form-container" style="max-width: 600px;">
            <h2 style="text-align: center; margin-bottom: 30px;">KONTAKT</h2>
            <form id="support-form">
                <input type="email" name="email" placeholder="Deine E-Mail" required style="margin-bottom: 15px;">
                <textarea name="message" rows="6" placeholder="Deine Nachricht an uns..." required></textarea>
                <button type="submit" id="support-btn" class="action-btn">Nachricht senden</button>
            </form>
            <p id="support-status" style="display:none; text-align:center; margin-top:20px; color:#5c8d67;"></p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 robi-twice Official Merch Store.</p>
    </footer>

    <script>
        // GLOBALE DATEN
        let cart = [];

        /**
         * Wechselt die Sichtbarkeit der Sektionen
         */
        function showSection(id) {
            console.log("Navigiere zu: " + id);
            const sections = document.querySelectorAll('.page-section');
            sections.forEach(s => s.classList.remove('active'));
            
            const target = document.getElementById(id);
            if(target) {
                target.classList.add('active');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /**
         * VERBESSERTER LIVE-CHECK: Prüft den Status direkt über die Live-URL
         */
        async function loadYouTubeContent() {
            console.log("Starte verbesserten Live-Check...");
            const channelId = "UCu1ZS9PqAJDStOS5EJiycEQ";
            
            // Standard-Boxen laden
            const leftId = "5Mf7S0pDyP0"; 
            const rightId = "vvj64ZskM9Y"; 
            document.getElementById('vid-left').innerHTML = `<iframe src="https://www.youtube.com/embed/${leftId}"></iframe>`;
            document.getElementById('vid-right').innerHTML = `<iframe src="https://www.youtube.com/embed/${rightId}"></iframe>`;

            // Der eigentliche Trick
            const liveUrl = `https://www.youtube.com/channel/${channelId}/live`;
            const proxyApi = `https://api.allorigins.win/get?url=${encodeURIComponent(liveUrl)}`;
            
            try {
                const response = await fetch(proxyApi);
                const data = await response.json();
                const html = data.contents;

                // Suche nach Merkmalen eines aktiven Streams
                const isStreaming = html.includes('isLive') || html.includes('watching') || html.includes('LIVE_STREAM_OFFLINE_STATE_NONE');
                const overlay = document.getElementById('offline-overlay');
                
                if (isStreaming && !html.includes('Originalton')) { 
                    overlay.style.display = 'none';
                    console.log("Status: LIVE erkannt!");
                } else {
                    overlay.style.display = 'flex';
                    console.log("Status: Offline.");
                }
            } catch(error) { 
                console.error("Live-Check fehlgeschlagen:", error);
                document.getElementById('offline-overlay').style.display = 'flex'; 
            }
        }

        /**
         * WARENKORB LOGIK
         */
        function addToCart(name, price, sizeId) {
            const size = document.getElementById(sizeId).value;
            const item = {
                name: name,
                price: price,
                size: size,
                id: Date.now()
            };
            
            cart.push(item);
            updateCartUI();
            
            // Kleines Feedback am Button
            const btn = event.target;
            const oldText = btn.innerText;
            btn.innerText = "HINZUGEFÜGT!";
            setTimeout(() => { btn.innerText = oldText; }, 1000);
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
            if(cart.length === 0) {
                document.getElementById('address-section').style.display = 'none';
                document.getElementById('show-address-btn').style.display = 'block';
            }
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-list-items');
            const totalLabel = document.getElementById('total-sum-display');
            
            let sum = 0;
            if(cart.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#333;'>Warenkorb ist leer.</p>";
            } else {
                let html = "";
                cart.forEach(item => {
                    sum += item.price;
                    html += `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:15px 0; border-bottom:1px solid #1a1a1a;">
                            <div><strong>${item.name}</strong><br><small>Größe: ${item.size}</small></div>
                            <div>
                                <span style="margin-right:15px; font-weight:bold;">${item.price.toFixed(2)} €</span>
                                <span class="delete-item-btn" onclick="removeFromCart(${item.id})">Löschen</span>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }
            totalLabel.innerText = sum.toFixed(2).replace('.', ',') + " €";
        }

        function openAddressForm() {
            if(cart.length === 0) return alert("Warenkorb ist leer!");
            document.getElementById('address-section').style.display = 'block';
            document.getElementById('show-address-btn').style.display = 'none';
            document.getElementById('address-section').scrollIntoView({ behavior: 'smooth' });
        }

        /**
         * FORMULAR-HANDLING
         */
        document.getElementById('support-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('support-btn');
            const status = document.getElementById('support-status');
            btn.innerText = "Wird gesendet...";
            
            const res = await fetch("https://formspree.io/f/xlgpdoak", {
                method: "POST",
                body: new FormData(this),
                headers: { 'Accept': 'application/json' }
            });
            
            if(res.ok) {
                status.innerText = "Verschickt! Wir melden uns.";
                status.style.display = "block";
                this.reset();
            }
            btn.innerText = "Nachricht senden";
        });

        document.getElementById('final-order-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('checkout-btn');
            btn.innerText = "Daten werden übertragen...";
            
            const summary = cart.map(i => `${i.name} (${i.size})`).join(', ');
            document.getElementById('hidden-summary').value = summary;

            const res = await fetch("https://formspree.io/f/xlgpdoak", {
                method: "POST",
                body: new FormData(this),
                headers: { 'Accept': 'application/json' }
            });

            if(res.ok) {
                const total = cart.reduce((a, b) => a + b.price, 0).toFixed(2);
                const paypal = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=bananielheinrich@gmail.com&amount=${total}&currency_code=EUR&item_name=robi-twice Bestellung: ${summary}`;
                window.location.href = paypal;
            }
        });

        // START
        window.onload = function() {
            loadYouTubeContent();
            updateCartUI();
            // Alle 3 Minuten Live-Status prüfen
            setInterval(loadYouTubeContent, 180000);
        };
    </script>
</body>
</html>
