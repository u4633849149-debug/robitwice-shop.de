<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROBI-TWICE | OFFICIAL HUB</title>
    <style>
        :root {
            --brand-green: #5c8d67;
            --brand-glow: rgba(92, 141, 103, 0.5);
            --dark-bg: #000000;
            --card-bg: #050505;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            background-image: url('logo.png');
            background-repeat: repeat;
            background-size: 150px;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(0,0,0,1) 100%);
            z-index: -1;
        }

        header {
            height: 110px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--brand-green);
        }

        .logo h1 {
            font-size: 35px;
            letter-spacing: 15px;
            text-transform: uppercase;
            font-weight: 900;
            cursor: pointer;
        }

        .nav-btns { display: flex; gap: 10px; }

        .btn {
            background: #0a0a0a;
            border: 1px solid #222;
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            text-transform: uppercase;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
        }

        .btn.active, .btn:hover {
            background: var(--brand-green);
            border-color: #fff;
            box-shadow: 0 0 15px var(--brand-glow);
        }

        .section { display: none; padding: 50px 5%; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .matrix {
            display: grid;
            grid-template-columns: 1fr 2.5fr 1fr;
            gap: 20px;
            align-items: center;
            max-width: 1600px;
            margin: 0 auto;
        }

        .v-box {
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #1a1a1a;
        }

        .v-box.main {
            border: 3px solid var(--brand-green);
            box-shadow: 0 0 40px var(--brand-glow);
        }

        iframe { width: 100%; height: 100%; border: none; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #111;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            transition: 0.4s;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--brand-green); }

        .img-box {
            height: 280px;
            background: #fff;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .img-box img { max-width: 80%; max-height: 80%; object-fit: contain; }

        .price { font-size: 28px; color: var(--brand-green); font-weight: 900; margin: 15px 0; display: block; }

        .content-box {
            max-width: 800px;
            margin: 0 auto;
            background: #050505;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #111;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #1a1a1a;
        }

        .input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .full-row { grid-column: span 2; }
        .form-label { font-size: 11px; color: #888; margin-bottom: 5px; display: block; text-transform: uppercase; }
        
        .radio-group { margin-bottom: 15px; font-size: 14px; }
        .radio-group label { margin-right: 15px; cursor: pointer; color: #ccc; }

        textarea.input { height: 120px; resize: none; border-radius: 10px; }

        footer {
            margin-top: 100px;
            padding: 50px;
            text-align: center;
            border-top: 1px solid #111;
            font-size: 12px;
            color: #444;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<header>
    <div class="nav-btns">
        <button class="btn active" id="btn-home" onclick="show('home')">Live</button>
        <button class="btn" id="btn-shop" onclick="show('shop')">Store</button>
        <button class="btn" id="btn-support" onclick="show('support')">Support</button>
    </div>
    <div class="logo"><h1 onclick="show('home')">robi-twice</h1></div>
    <div class="nav-btns">
        <button class="btn" id="btn-cart" onclick="show('Warenkorb')">Warenkorb [<span id="count">0</span>]</button>
    </div>
</header>

<div id="home" class="section" style="display: block;">
    <div class="matrix">
        <div class="v-box"><iframe src="https://www.youtube.com/embed/5Mf7S0pDyP0?mute=1&autoplay=1"></iframe></div>
        <div class="v-box main"><iframe src="https://www.youtube.com/embed/live_stream?channel=UCu1ZS9PqAJDStOS5EJiycEQ&autoplay=1&mute=1"></iframe></div>
        <div class="v-box"><iframe src="https://www.youtube.com/embed/vvj64ZskM9Y?mute=1&autoplay=1"></iframe></div>
    </div>
</div>

<div id="shop" class="section">
    <div class="grid">
        <div class="Warenkorb">
            <div class="img-box"><img src="tshirt.png" alt="Shirt"></div>
            <h3>robi-twice Shirt </h3>
            <span class="price">32,00 €</span>
            <button class="btn" style="width:100%" onclick="add('Signature Tee', 29.95)">In den Warenkorb</button>
        </div>
        <div class="card">
            <div class="img-box"><img src="hoodie.png" alt="Hoodie"></div>
            <h3>robi-twice logo Hoodie</h3>
            <span class="price">41,00 €</span>
            <button class="btn" style="width:100%" onclick="add('Legacy Hoodie', 54.95)">In den Warenkorb</button>
        </div>
        <div class="card">
            <div class="img-box"><img src="cap.png" alt="Cap"></div>
            <h3>robi-twice Cap</h3>
            <span class="price">29,00 €</span>
            <button class="btn" style="width:100%" onclick="add('Official Logo Cap', 24.95)">In den Warenkorb</button>
        </div>
    </div>
</div>

<div id="support" class="section">
    <div class="content-box">
        <h2 style="text-align: center; margin-bottom: 20px;">Support Kontakt</h2>
        <form id="support-form">
            <input type="text" name="Support_Name" placeholder="Dein Name" class="input" style="border-radius:10px" required>
            <input type="email" name="Support_Email" placeholder="Deine Email" class="input" style="border-radius:10px" required>
            <textarea name="Support_Nachricht" placeholder="Wie können wir helfen?" class="input" required></textarea>
            <button type="submit" class="btn" style="width:100%">Anfrage senden</button>
        </form>
        <p id="support-msg" style="display:none; color:var(--brand-green); text-align:center; margin-top:15px;">Danke! Deine Nachricht wurde gesendet.</p>
    </div>
</div>

<div id="cart" class="section">
    <div class="content-box">
        <h2 style="margin-bottom: 25px; font-size: 28px;">Deine Bestellung</h2>
        <div id="items"></div>
        <h3 style="margin: 20px 0;">Gesamtbetrag: <span id="total" style="color:var(--brand-green);">0,00 €</span></h3>
        <hr style="border:0; border-top:1px solid #222; margin: 25px 0;">
        
        <form id="order-form">
            <h3 style="margin-bottom: 15px; font-size: 18px;">Versandadresse</h3>
            
            <div class="radio-group">
                <span class="form-label">Anrede*</span>
                <label><input type="radio" name="Kunde_Anrede" value="Herr" checked> Herr</label>
                <label><input type="radio" name="Kunde_Anrede" value="Frau"> Frau</label>
            </div>

            <div class="form-grid">
                <div>
                    <label class="form-label">Vorname*</label>
                    <input type="text" name="Kunde_Vorname" class="input" required>
                </div>
                <div>
                    <label class="form-label">Nachname*</label>
                    <input type="text" name="Kunde_Nachname" class="input" required>
                </div>
            </div>

            <div class="radio-group">
                <span class="form-label">Typ*</span>
                <label><input type="radio" name="Kunde_Typ" value="Privat" checked> Privat</label>
                <label><input type="radio" name="Kunde_Typ" value="Geschäftlich"> Geschäftlich</label>
            </div>

            <div class="form-grid">
                <div style="grid-column: span 1.5;">
                    <label class="form-label">Straße*</label>
                    <input type="text" name="Kunde_Strasse" class="input" required>
                </div>
                <div style="grid-column: span 0.5;">
                    <label class="form-label">Hausnr.*</label>
                    <input type="text" name="Kunde_Hausnr" class="input" required>
                </div>
                <div>
                    <label class="form-label">Postleitzahl*</label>
                    <input type="text" name="Kunde_PLZ" class="input" required>
                </div>
                <div>
                    <label class="form-label">Stadt*</label>
                    <input type="text" name="Kunde_Stadt" class="input" required>
                </div>
            </div>

            <div class="full-row">
                <label class="form-label">Land*</label>
                <select name="Kunde_Land" class="input" style="background:#000; color:white;">
                    <option value="Deutschland">Deutschland</option>
                    <option value="Österreich">Österreich</option>
                    <option value="Schweiz">Schweiz</option>
                </select>
            </div>

            <div class="full-row">
                <label class="form-label">Telefonnummer</label>
                <input type="text" name="Kunde_Telefon" class="input" placeholder="Optional">
            </div>
            
            <input type="hidden" name="BESTELLTE_ARTIKEL" id="order-input">
            <input type="hidden" name="GESAMTSUMME" id="total-input">
            
            <label class="form-label">PayPal Email für Rechnungsabgleich*</label>
            <input type="email" name="_replyto" placeholder="Deine PayPal Email" class="input" style="border-radius:10px" required>
            
            <button type="submit" class="btn" style="width:100%; background:#fff; color:#000; font-size: 14px; margin-top: 10px;">Jetzt per PayPal bezahlen</button>
        </form>
    </div>
</div>

<footer>&copy; 2026 ROBI-TWICE OFFICIAL. ALL RIGHTS RESERVED.</footer>

<script>
    let cart = [];

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
        window.scrollTo(0,0);
    }

    function add(name, price) {
        cart.push({name, price});
        update();
    }

    function update() {
        document.getElementById('count').innerText = cart.length;
        let html = "";
        let total = 0;
        let emailText = "";
        
        cart.forEach((item, index) => {
            total += item.price;
            html += `<div class="cart-item"><span>${item.name}</span><span>${item.price.toFixed(2)} €</span></div>`;
            emailText += (index + 1) + ". " + item.name + " (" + item.price.toFixed(2) + "€)\n";
        });
        
        document.getElementById('items').innerHTML = html || "Dein Warenkorb ist leer.";
        document.getElementById('total').innerText = total.toFixed(2).replace('.', ',') + " €";
        
        // Hier werden die Daten für die E-Mail gespeichert
        document.getElementById('order-input').value = emailText;
        document.getElementById('total-input').value = total.toFixed(2) + " €";
    }

    document.getElementById('support-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const data = new FormData(this);
        await fetch('https://formspree.io/f/xlgpdoak', {
            method: 'POST',
            body: data,
            headers: { 'Accept': 'application/json' }
        });
        document.getElementById('support-msg').style.display = 'block';
        this.reset();
    });

    document.getElementById('order-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        if(cart.length === 0) return alert("Warenkorb leer!");
        
        const data = new FormData(e.target);
        
        // Diese Zeile schickt ALLES (Adresse + Artikelliste) an Formspree
        const response = await fetch('https://formspree.io/f/xlgpdoak', { 
            method: 'POST', 
            body: data, 
            headers: {'Accept': 'application/json'} 
        });

        if(response.ok) {
            const sum = cart.reduce((a, b) => a + b.price, 0).toFixed(2);
            window.location.href = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=bananielheinrich@gmail.com&amount=${sum}&currency_code=EUR&item_name=RobiTwice-Order`;
        } else {
            alert("Fehler beim Übertragen der Bestelldaten.");
        }
    });
</script>
</body>
</html>
