<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robi-twice | Official Merch & Live Entertainment</title>
    
    <style>
        /* --- GLOBALER RESET (Screenshot Style) --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #080808; 
            color: #ffffff; 
            overflow-x: hidden;
            background-image: url('logo.png'); 
            background-repeat: repeat; 
            background-position: center; 
            background-size: 160px; 
            background-attachment: fixed;
            line-height: 1.6;
        }
        
        /* Dunkles Overlay für Kontrast */
        body::before {
            content: ""; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95); 
            z-index: -1;
        }

        /* --- HEADER & NAVIGATION --- */
        header { 
            background-color: #111111; 
            padding: 25px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 2px solid #5c8d67;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
        }
        
        .nav-group {
            display: flex;
            gap: 15px;
        }

        .logo-nav { 
            font-size: 32px; 
            font-weight: 900; 
            cursor: pointer; 
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%);
            text-shadow: 0 0 20px #5c8d67; 
            letter-spacing: 5px; 
            text-transform: uppercase;
            transition: 0.4s ease-in-out;
        }

        .logo-nav:hover {
            text-shadow: 0 0 40px #5c8d67, 0 0 10px #ffffff;
        }

        .nav-btn { 
            background-color: #1a1a1a; 
            color: white; 
            padding: 12px 24px; 
            border: 1px solid #333333; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 800; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-btn:hover { 
            background-color: #5c8d67; 
            border-color: #ffffff; 
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(92, 141, 103, 0.5);
        }

        /* --- VIDEO SEKTION (MASSIVE) --- */
        .video-main-container {
            padding: 80px 0;
            text-align: center;
        }

        .video-wrapper { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 40px; 
            max-width: 1700px; 
            margin: 0 auto; 
            flex-wrap: wrap; 
            padding: 0 30px;
        }
        
        .side-vid { 
            flex: 1; 
            min-width: 340px; 
            max-width: 450px; 
            aspect-ratio: 16/9; 
            background: #000000; 
            border: 2px solid #1a1a1a; 
            border-radius: 20px; 
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            transition: 0.4s;
        }

        .side-vid:hover {
            border-color: #333;
            transform: scale(1.02);
        }
        
        .main-stream { 
            flex: 2; 
            min-width: 450px; 
            max-width: 1000px; 
            aspect-ratio: 16/9; 
            border: 4px solid #5c8d67; 
            border-radius: 30px; 
            overflow: hidden; 
            position: relative; 
            background: #000;
            box-shadow: 0 0 60px rgba(92, 141, 103, 0.2);
            animation: pulse-border 4s infinite alternate;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 20px rgba(92, 141, 103, 0.2); }
            100% { box-shadow: 0 0 70px rgba(92, 141, 103, 0.6); }
        }
        
        #offline-overlay {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle, #111 0%, #000 100%); 
            z-index: 20; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            transition: 0.5s;
        }
        
        .neon-status { 
            color: #ffffff; 
            text-shadow: 0 0 20px #5c8d67, 0 0 40px #5c8d67; 
            font-size: 3.5rem; 
            font-weight: 900; 
            letter-spacing: 10px;
            margin-bottom: 20px;
        }

        /* --- SHOP PRODUKTE (Screenshot 173656 Style) --- */
        .section-title {
            text-align: center;
            font-size: 42px;
            margin: 100px 0 60px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 900;
        }

        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); 
            gap: 50px; 
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 40px;
        }
        
        .product-card { 
            background: #111111; 
            border: 1px solid #222222; 
            border-radius: 25px; 
            text-align: center; 
            padding-bottom: 40px; 
            transition: all 0.4s ease; 
            overflow: hidden;
        }
        
        .product-card:hover { 
            transform: translateY(-15px); 
            border-color: #5c8d67; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }
        
        .img-container { 
            width: 100%; 
            height: 450px; 
            background: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }
        
        .img-container img { 
            max-width: 90%; 
            max-height: 90%; 
            object-fit: contain; 
        }

        .product-meta {
            padding: 30px 20px 0;
        }

        .product-name {
            font-size: 22px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: #fff;
        }
        
        .product-price-tag { 
            font-size: 30px; 
            color: #5c8d67; 
            font-weight: 900; 
            margin-bottom: 25px; 
            display: block; 
        }

        /* --- FORMULAR (Screenshot 165834 / 165908) --- */
        .order-container { 
            max-width: 850px; 
            margin: 50px auto; 
            background: #0f0f0f; 
            padding: 60px; 
            border-radius: 35px; 
            border: 2px solid #1a1a1a; 
            box-shadow: 0 40px 100px rgba(0,0,0,1);
        }

        .form-title {
            font-size: 24px;
            text-align: center;
            margin-bottom: 40px;
            text-transform: uppercase;
            color: #5c8d67;
            letter-spacing: 2px;
        }

        .input-row { 
            display: flex; 
            gap: 20px; 
            margin-bottom: 25px; 
        }

        .input-field { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
        }

        .input-field label {
            font-size: 11px;
            color: #555;
            margin-bottom: 8px;
            margin-left: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }
        
        input, select, textarea { 
            width: 100%; 
            padding: 18px; 
            background: #000000; 
            color: #ffffff; 
            border: 1px solid #222222; 
            border-radius: 12px; 
            font-size: 16px; 
            transition: 0.3s;
        }
        
        input:focus { 
            border-color: #5c8d67; 
            outline: none; 
            box-shadow: 0 0 15px rgba(92, 141, 103, 0.3);
        }

        /* Validierung Rot (Screenshot 165834) */
        input:invalid:focus {
            border-color: #ff4d4d;
        }
        
        .buy-btn { 
            width: 100%; 
            padding: 24px; 
            background: #5c8d67; 
            color: #ffffff; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 900; 
            text-transform: uppercase; 
            transition: 0.4s; 
            font-size: 18px;
            letter-spacing: 3px;
            margin-top: 30px;
        }
        
        .buy-btn:hover { 
            background-color: #4a7354; 
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        /* --- FOOTER --- */
        footer { 
            text-align: center; 
            padding: 100px 20px; 
            color: #333; 
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .page-block { display: none; animation: fadeIn 0.8s ease; }
        .active-block { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <header>
        <div class="nav-group">
            <button class="nav-btn" onclick="openPage('home')">Live Stream</button>
            <button class="nav-btn" onclick="openPage('shop')">Merch Shop</button>
        </div>
        
        <div class="logo-nav" onclick="openPage('home')">robi-twice</div>
        
        <div class="nav-group">
            <button class="nav-btn" onclick="openPage('cart')">🛒 Warenkorb (<span id="count-badge">0</span>)</button>
        </div>
    </header>

    <section id="home" class="page-block active-block">
        <div class="video-main-container">
            <div class="video-wrapper">
                <div class="side-vid" id="left-box"></div>
                
                <div class="main-stream" id="stream-container">
                    <iframe id="youtube-iframe" src="" allowfullscreen></iframe>
                    
                    <div id="offline-overlay">
                        <div class="neon-status">OFFLINE</div>
                        <p style="color: #555; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;">
                            Aktuell kein Live-Event. Schau später vorbei!
                        </p>
                    </div>
                </div>

                <div class="side-vid" id="right-box"></div>
            </div>
        </div>
    </section>

    <section id="shop" class="page-block">
        <h2 class="section-title">Limitierter Merch</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <div class="img-container"><img src="tshirt.png"></div>
                <div class="product-meta">
                    <h3 class="product-name">Robi-Twice Shirt Black Edition</h3>
                    <span class="product-price-tag">29,90 €</span>
                    <select id="sel-size-1" style="margin-bottom: 20px;">
                        <option value="S">S - Regular Fit</option>
                        <option value="M">M - Regular Fit</option>
                        <option value="L">L - Regular Fit</option>
                        <option value="XL">XL - Oversize Look</option>
                    </select>
                    <button class="buy-btn" onclick="cartAdd('T-Shirt Black', 29.90, 'sel-size-1')">In den Warenkorb</button>
                </div>
            </div>

            <div class="product-card">
                <div class="img-container"><img src="hoodie.png"></div>
                <div class="product-meta">
                    <h3 class="product-name">Twice-Official Hoodie Grey</h3>
                    <span class="product-price-tag">49,90 €</span>
                    <select id="sel-size-2" style="margin-bottom: 20px;">
                        <option value="M">M - Premium Cotton</option>
                        <option value="L">L - Premium Cotton</option>
                        <option value="XL">XL - Premium Cotton</option>
                    </select>
                    <button class="buy-btn" onclick="cartAdd('Hoodie Grey', 49.90, 'sel-size-2')">In den Warenkorb</button>
                </div>
            </div>

        </div>
    </section>

    <section id="cart" class="page-block">
        <div class="order-container">
            <h2 class="form-title">Deine Bestellung</h2>
            
            <div id="cart-items-display" style="margin-bottom: 40px; padding: 20px; background: #000; border-radius: 15px;">
                </div>
            
            <div id="checkout-form-area" style="display:none;">
                <form id="main-order-form">
                    <div class="input-row">
                        <div class="input-field"><label>Vorname*</label><input type="text" name="vname" required></div>
                        <div class="input-field"><label>Nachname*</label><input type="text" name="nname" required></div>
                    </div>
                    <div class="input-row">
                        <div class="input-field" style="flex:3;"><label>Straße*</label><input type="text" name="str" required></div>
                        <div class="input-field"><label>Hausnr.*</label><input type="text" name="nr" required></div>
                    </div>
                    <div class="input-row">
                        <div class="input-field"><label>PLZ*</label><input type="text" name="plz" required></div>
                        <div class="input-field"><label>Stadt*</label><input type="text" name="city" required></div>
                    </div>
                    <div class="input-field" style="margin-bottom: 20px;">
                        <label>E-Mail Adresse*</label>
                        <input type="email" name="mail" required>
                    </div>
                    
                    <input type="hidden" name="bestell_liste" id="hidden-cart-input">
                    <button type="submit" id="submit-order-btn" class="buy-btn">JETZT BEZAHLEN</button>
                </form>
            </div>
            
            <button id="show-form-btn" class="buy-btn" onclick="activateCheckout()">ZUR KASSE GEHEN</button>
        </div>
    </section>

    <footer>
        &copy; 2026 robi-twice Official. Alle Rechte vorbehalten.
    </footer>

    <script>
        // GLOBALE VARIABLEN
        let currentCart = [];
        const CHANNEL_ID = "UCu1ZS9PqAJDStOS5EJiycEQ";

        /**
         * SEITENSTEUERUNG
         */
        function openPage(id) {
            document.querySelectorAll('.page-block').forEach(p => p.classList.remove('active-block'));
            document.getElementById(id).classList.add('active-block');
            window.scrollTo(0,0);
        }

        /**
         * VERBESSERTE LIVE-STREAM LOGIK
         * Verhindert graues Bild und prüft den Status präzise.
         */
        async function updateLiveStatus() {
            console.log("Status-Check läuft...");
            
            // Standard-Videos für die Seiten laden
            document.getElementById('left-box').innerHTML = `<iframe src="https://www.youtube.com/embed/5Mf7S0pDyP0"></iframe>`;
            document.getElementById('right-box').innerHTML = `<iframe src="https://www.youtube.com/embed/vvj64ZskM9Y"></iframe>`;

            const streamIframe = document.getElementById('youtube-iframe');
            const overlay = document.getElementById('offline-overlay');

            // Wir nutzen AllOrigins als Proxy, um den Status der Live-Seite zu lesen
            const liveCheckUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://www.youtube.com/channel/' + CHANNEL_ID + '/live')}`;

            try {
                const response = await fetch(liveCheckUrl);
                const data = await response.json();
                const html = data.contents;

                // Suche nach Merkmalen eines echten Live-Streams im Quelltext
                const isLive = html.includes('isLive":true') || (html.includes('{"label":"LIVE"}') && !html.includes('Originalton'));

                if (isLive) {
                    console.log("ERGEBNIS: KANAL IST LIVE!");
                    streamIframe.src = `https://www.youtube.com/embed/live_stream?channel=${CHANNEL_ID}&autoplay=1&mute=1`;
                    overlay.style.opacity = "0";
                    setTimeout(() => { overlay.style.display = "none"; }, 500);
                } else {
                    console.log("ERGEBNIS: KANAL IST OFFLINE.");
                    streamIframe.src = ""; // Iframe leeren um Bandbreite/Fehler zu sparen
                    overlay.style.display = "flex";
                    overlay.style.opacity = "1";
                }
            } catch (err) {
                console.error("Fehler beim Live-Check:", err);
                overlay.style.display = "flex";
            }
        }

        /**
         * WARENKORB SYSTEM
         */
        function cartAdd(name, price, sId) {
            const size = document.getElementById(sId).value;
            currentCart.push({ name, price, size, id: Date.now() });
            updateCartDisplay();
            
            // Kleiner Button Effekt
            const b = event.target;
            b.innerText = "HINZUGEFÜGT!";
            setTimeout(() => { b.innerText = "In den Warenkorb"; }, 800);
        }

        function removeFromCart(id) {
            currentCart = currentCart.filter(item => item.id !== id);
            updateCartDisplay();
        }

        function updateCartDisplay() {
            document.getElementById('count-badge').innerText = currentCart.length;
            const container = document.getElementById('cart-items-display');
            
            if(currentCart.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#444;'>Warenkorb leer.</p>";
                document.getElementById('checkout-form-area').style.display = "none";
                document.getElementById('show-form-btn').style.display = "block";
            } else {
                let html = "";
                let sum = 0;
                currentCart.forEach(item => {
                    sum += item.price;
                    html += `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:15px 0; border-bottom:1px solid #111;">
                            <div style="text-align:left;">
                                <strong>${item.name}</strong><br><small style="color:#5c8d67">${item.size}</small>
                            </div>
                            <div>
                                <span style="font-weight:bold; margin-right:15px;">${item.price.toFixed(2)} €</span>
                                <button onclick="removeFromCart(${item.id})" style="background:none; border:1px solid #ff4444; color:#ff4444; cursor:pointer; padding:4px 8px; border-radius:5px;">X</button>
                            </div>
                        </div>
                    `;
                });
                html += `<div style="text-align:right; margin-top:20px; font-size:24px; color:#5c8d67; font-weight:900;">GESAMT: ${sum.toFixed(2)} €</div>`;
                container.innerHTML = html;
            }
        }

        function activateCheckout() {
            if(currentCart.length === 0) return alert("Warenkorb ist leer!");
            document.getElementById('checkout-form-area').style.display = "block";
            document.getElementById('show-form-btn').style.display = "none";
        }

        /**
         * FORMULAR-SUBMIT & PAYPAL
         */
        document.getElementById('main-order-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-order-btn');
            btn.innerText = "SICHERE VERBINDUNG...";
            
            const summary = currentCart.map(i => `${i.name} [${i.size}]`).join(', ');
            document.getElementById('hidden-cart-input').value = summary;

            const res = await fetch("https://formspree.io/f/xlgpdoak", {
                method: "POST",
                body: new FormData(this),
                headers: { 'Accept': 'application/json' }
            });

            if(res.ok) {
                const total = currentCart.reduce((a, b) => a + b.price, 0).toFixed(2);
                window.location.href = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=bananielheinrich@gmail.com&amount=${total}&currency_code=EUR&item_name=Bestellung von robi-twice: ${summary}`;
            }
        });

        /**
         * INITIALISIERUNG (Screenshot 173014 Style)
         */
        window.addEventListener('DOMContentLoaded', () => {
            console.log("robi-twice System Start...");
            updateLiveStatus();
            updateCartDisplay();
            
            // Alle 5 Minuten Live-Status prüfen
            setInterval(updateLiveStatus, 300000);
        });

    </script>
</body>
</html>
