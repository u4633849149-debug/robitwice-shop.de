<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robi-twice | Live & Shop</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: #000; color: #fff; overflow-x: hidden; }
        header { background-color: #1a1a1a; color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .nav-left, .nav-right { display: flex; gap: 10px; align-items: center; }
        .logo-nav { font-size: 24px; font-weight: bold; cursor: pointer; text-transform: lowercase; position: absolute; left: 50%; transform: translateX(-50%); }
        
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { 
            display: block; position: absolute; background-color: #1a1a1a; min-width: 150px; 
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5); z-index: 100; border-radius: 4px; border: 1px solid #333;
            opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.3s ease-in-out; pointer-events: none;
        }
        .dropdown:hover .dropdown-content { opacity: 1; visibility: visible; transform: translateY(0); pointer-events: auto; }
        .dropdown-content::before { content: ""; position: absolute; top: -15px; left: 0; width: 100%; height: 15px; }
        .dropdown-content button { color: white; padding: 12px 16px; display: block; width: 100%; border: none; background: none; text-align: left; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .dropdown-content button:hover { background-color: #333; color: #5c8d67; }

        .nav-btn { background-color: #333; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.3s; }
        .btn-lang-main { background-color: #5c8d67 !important; }
        .cart-count { background: #5c8d67; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px; margin-left: 5px; }

        /* Zoom */
        .product-image-container { background: #f5f5f5; height: 400px; display: flex; justify-content: center; align-items: center; overflow: hidden; cursor: crosshair; }
        .product-image { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.1s ease-out; transform-origin: center center; }

        .page-section { display: none; padding: 40px 5%; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; justify-content: center; }
        .product-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; padding-bottom: 20px; max-width: 400px; margin: auto; text-align: center; }
        .product-info { padding: 20px; text-align: left; }
        
        /* Preis-Styles (angepasst ohne Sale) */
        .price-container { display: flex; align-items: center; margin-bottom: 10px; }
        .price { font-size: 22px; color: #5c8d67; font-weight: bold; }

        select, input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: white; border: 1px solid #333; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        .btn-add { display: block; width: 100%; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; background-color: #5c8d67; color: white; border: none; }
        .remove-btn { background: #ff4d4d; color: white; border: none; border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <div class="dropdown">
                <button class="nav-btn lang-nav-prod">Produkte ▾</button>
                <div class="dropdown-content">
                    <button onclick="showSection('shirts-section')" class="lang-drop-shirts">Shirts</button>
                    <button onclick="showSection('pullover-section')" class="lang-drop-hoodies">Pullover</button>
                    <button onclick="showSection('hats-section')" class="lang-drop-hats">Mützen</button>
                </div>
            </div>
            <button class="nav-btn" onclick="showSection('home')">🏠 Live</button>
        </div>

        <div class="logo-nav" onclick="showSection('home')">robi-twice</div>

        <div class="nav-right">
            <button class="nav-btn lang-nav-support" onclick="showSection('support-section')">Support</button>
            <div class="dropdown">
                <button class="nav-btn btn-lang-main lang-nav-lang">Sprache ▾</button>
                <div class="dropdown-content" style="right: 0;">
                    <button onclick="changeLanguage('de')">Deutsch 🇩🇪</button>
                    <button onclick="changeLanguage('en')">English 🇺🇸</button>
                    <button onclick="changeLanguage('es')">Español 🇪🇸</button>
                    <button onclick="changeLanguage('fr')">Français 🇫🇷</button>
                </div>
            </div>
            <button class="nav-btn" onclick="showSection('cart-section')">🛒 <span id="cart-counter" class="cart-count">0</span></button>
        </div>
    </header>

    <section id="home" class="page-section active">
        <h1 class="lang-home-title">robi-twice Live</h1>
        <div style="max-width: 800px; margin: auto; aspect-ratio: 16/9;">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/live_stream?channel=UCm8u2eBf67RCH16p2oA9uSQ" frameborder="0" allowfullscreen></iframe>
        </div>
    </section>

    <section id="shirts-section" class="page-section">
        <div class="product-grid">
            <div class="product-card">
                <div class="product-image-container" onmousemove="interactiveZoom(event)" onmouseleave="resetZoom(event)"><img src="tshirt.jpg" class="product-image"></div>
                <div class="product-info">
                    <h3 class="lang-p-shirt">robi-twice Signature Shirt</h3>
                    <div class="price-container">
                        <span class="price">30,00 €</span>
                    </div>
                    <select id="size-shirt"><option>S</option><option>M</option><option>L</option><option>XL</option></select>
                    <button class="btn-add lang-btn-add" onclick="addToCart('Signature Shirt', 30.00, 'size-shirt')">In den Warenkorb</button>
                </div>
            </div>
        </div>
    </section>

    <section id="pullover-section" class="page-section">
        <div class="product-grid">
            <div class="product-card">
                <div class="product-image-container" onmousemove="interactiveZoom(event)" onmouseleave="resetZoom(event)"><img src="hoodie.png" class="product-image"></div>
                <div class="product-info">
                    <h3 class="lang-p-hoodie">robi-twice Logo Hoodie</h3>
                    <div class="price-container">
                        <span class="price">40,00 €</span>
                    </div>
                    <select id="size-hoodie"><option>S</option><option>M</option><option>L</option><option>XL</option></select>
                    <button class="btn-add lang-btn-add" onclick="addToCart('Logo Hoodie', 40.00, 'size-hoodie')">In den Warenkorb</button>
                </div>
            </div>
        </div>
    </section>

    <section id="hats-section" class="page-section">
        <h2 class="lang-accessoires" style="text-align:center; margin-bottom: 20px;">Accessoires</h2>
        <div class="product-grid">
            <div class="product-card">
                <div class="product-image-container" onmousemove="interactiveZoom(event)" onmouseleave="resetZoom(event)"><img src="muetze.png" class="product-image"></div>
                <div class="product-info">
                    <h3 class="lang-p-hat">robi-twice Logo Mütze</h3>
                    <div class="price-container">
                        <span class="price">17,00 €</span>
                    </div>
                    <select id="size-hat"><option class="lang-size-os">Einheitsgröße (OS)</option></select>
                    <button class="btn-add lang-btn-add" onclick="addToCart('Logo Mütze', 17.00, 'size-hat')">In den Warenkorb</button>
                </div>
            </div>
        </div>
    </section>

    <section id="support-section" class="page-section">
        <div style="max-width: 500px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333;">
            <h1 class="lang-nav-support">Support</h1>
            <label class="lang-label-issue" style="font-size: 14px; color: #777;">Was ist das Problem?</label>
            <select id="support-issue">
                <option value="Defekt" class="opt-1">Defekt / Beschädigt</option>
                <option value="Falsche Bestellung" class="opt-2">Falsche Größe/Farbe bestellt</option>
                <option value="Nicht gefallen" class="opt-3">Gefällt mir nicht</option>
                <option value="Versand" class="opt-4">Frage zum Versand</option>
                <option value="Sonstiges" class="opt-5">Sonstiges</option>
            </select>
            <input type="email" id="cust-email" class="lang-ph-email" placeholder="E-Mail">
            <textarea id="cust-msg" rows="5" class="lang-ph-msg" placeholder="Nachricht"></textarea>
            <button class="btn-add lang-btn-send" onclick="sendSupportTicket()">Senden</button>
            <p id="ticket-status" style="margin-top:10px; color:#5c8d67;"></p>
        </div>
    </section>

    <section id="cart-section" class="page-section">
        <div style="max-width: 600px; margin: auto;">
            <h1 class="lang-cart-title">Warenkorb</h1>
            <ul id="cart-items" style="list-style:none; padding:0;"></ul>
            <h3 id="cart-total">Gesamt: 0,00 €</h3>
            <a id="paypal-link" href="#" style="display:block; background:#0070ba; color:white; padding:15px; border-radius:30px; text-decoration:none; text-align:center; font-weight:bold;">PayPal Checkout</a>
        </div>
    </section>

    <script>
        let cart = [];
        let currentLang = 'de';

        const translations = {
            de: {
                navProd: "Produkte ▾", dropShirts: "Shirts", dropHoodies: "Pullover", dropHats: "Mützen",
                navSupport: "Support", navLang: "Sprache ▾", homeTitle: "robi-twice Live",
                pShirt: "robi-twice Signature Shirt", pHoodie: "robi-twice Logo Hoodie", pHat: "robi-twice Logo Mütze",
                btnAdd: "In den Warenkorb", btnSend: "Senden", cartTitle: "Warenkorb", total: "Gesamt", 
                sizeOS: "Einheitsgröße (OS)", phEmail: "E-Mail", phMsg: "Nachricht", accessoires: "Accessoires",
                lblIssue: "Was ist das Problem?", opt1: "Defekt / Beschädigt", opt2: "Falsche Größe/Farbe bestellt",
                opt3: "Gefällt mir nicht", opt4: "Frage zum Versand", opt5: "Sonstiges"
            },
            en: {
                navProd: "Products ▾", dropShirts: "T-Shirts", dropHoodies: "Hoodies", dropHats: "Beanies",
                navSupport: "Support", navLang: "Language ▾", homeTitle: "robi-twice Live",
                pShirt: "robi-twice Signature Shirt", pHoodie: "robi-twice Logo Hoodie", pHat: "robi-twice Logo Hat",
                btnAdd: "Add to Cart", btnSend: "Send", cartTitle: "Your Cart", total: "Total", 
                sizeOS: "One Size (OS)", phEmail: "Email", phMsg: "Message", accessoires: "Accessories",
                lblIssue: "What is the issue?", opt1: "Defective / Damaged", opt2: "Wrong size/color ordered",
                opt3: "Don't like it", opt4: "Shipping question", opt5: "Other"
            },
            es: {
                navProd: "Productos ▾", dropShirts: "Camisetas", dropHoodies: "Sudaderas", dropHats: "Gorros",
                navSupport: "Soporte", navLang: "Idioma ▾", homeTitle: "robi-twice en Vivo",
                pShirt: "Camiseta Signature", pHoodie: "Sudadera Logo", pHat: "Gorro Logo",
                btnAdd: "Añadir al carrito", btnSend: "Enviar", cartTitle: "Carrito", total: "Total", 
                sizeOS: "Talla única (OS)", phEmail: "Correo electrónico", phMsg: "Mensaje", accessoires: "Accesorios",
                lblIssue: "¿Cuál es el problema?", opt1: "Defectuoso / Dañado", opt2: "Tamaño/color incorrecto",
                opt3: "No me gusta", opt4: "Pregunta de envío", opt5: "Otro"
            },
            fr: {
                navProd: "Produits ▾", dropShirts: "T-Shirts", dropHoodies: "Pulls", dropHats: "Bonnets",
                navSupport: "Support", navLang: "Langue ▾", homeTitle: "robi-twice en Direct",
                pShirt: "T-Shirt Signature", pHoodie: "Sweat à capuche", pHat: "Bonnet Logo",
                btnAdd: "Ajouter au panier", btnSend: "Envoyer", cartTitle: "Panier", total: "Total", 
                sizeOS: "Taille unique (OS)", phEmail: "E-mail", phMsg: "Message", accessoires: "Accessoires",
                lblIssue: "Quel est le problème ?", opt1: "Défectueux / Endommagé", opt2: "Mauvaise taille/couleur",
                opt3: "Je n'aime pas", opt4: "Question d'expédition", opt5: "Autre"
            }
        };

        function changeLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            if(!t) return;
            
            document.querySelectorAll('.lang-nav-prod').forEach(el => el.innerText = t.navProd);
            document.querySelectorAll('.lang-drop-shirts').forEach(el => el.innerText = t.dropShirts);
            document.querySelectorAll('.lang-drop-hoodies').forEach(el => el.innerText = t.dropHoodies);
            document.querySelectorAll('.lang-drop-hats').forEach(el => el.innerText = t.dropHats);
            document.querySelectorAll('.lang-nav-support').forEach(el => el.innerText = t.navSupport);
            document.querySelectorAll('.lang-nav-lang').forEach(el => el.innerText = t.navLang);
            document.querySelectorAll('.lang-home-title').forEach(el => el.innerText = t.homeTitle);
            document.querySelectorAll('.lang-p-shirt').forEach(el => el.innerText = t.pShirt);
            document.querySelectorAll('.lang-p-hoodie').forEach(el => el.innerText = t.pHoodie);
            document.querySelectorAll('.lang-p-hat').forEach(el => el.innerText = t.pHat);
            document.querySelectorAll('.lang-btn-add').forEach(el => el.innerText = t.btnAdd);
            document.querySelectorAll('.lang-btn-send').forEach(el => el.innerText = t.btnSend);
            document.querySelectorAll('.lang-cart-title').forEach(el => el.innerText = t.cartTitle);
            document.querySelectorAll('.lang-size-os').forEach(el => el.innerText = t.sizeOS);
            document.querySelectorAll('.lang-accessoires').forEach(el => el.innerText = t.accessoires);
            document.querySelectorAll('.lang-label-issue').forEach(el => el.innerText = t.lblIssue);
            document.querySelectorAll('.opt-1').forEach(el => el.innerText = t.opt1);
            document.querySelectorAll('.opt-2').forEach(el => el.innerText = t.opt2);
            document.querySelectorAll('.opt-3').forEach(el => el.innerText = t.opt3);
            document.querySelectorAll('.opt-4').forEach(el => el.innerText = t.opt4);
            document.querySelectorAll('.opt-5').forEach(el => el.innerText = t.opt5);

            const emailField = document.getElementById('cust-email');
            const msgField = document.getElementById('cust-msg');
            if(emailField) emailField.placeholder = t.phEmail;
            if(msgField) msgField.placeholder = t.phMsg;

            updateCartDisplay();
        }

        function interactiveZoom(e) {
            const container = e.currentTarget;
            const img = container.querySelector('img');
            const rect = container.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / container.offsetWidth) * 100;
            const y = ((e.clientY - rect.top) / container.offsetHeight) * 100;
            img.style.transformOrigin = `${x}% ${y}%`;
            img.style.transform = "scale(2.5)";
        }
        function resetZoom(e) { e.currentTarget.querySelector('img').style.transform = "scale(1)"; }

        function showSection(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function addToCart(name, price, sizeId) {
            const size = document.getElementById(sizeId).value;
            cart.push({ name, price, size });
            document.getElementById('cart-counter').innerText = cart.length;
            updateCartDisplay();
            alert(name + " OK!");
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            document.getElementById('cart-counter').innerText = cart.length;
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const list = document.getElementById('cart-items');
            let total = 0; let itemSummary = "";
            list.innerHTML = "";
            cart.forEach((item, index) => {
                total += item.price;
                itemSummary += `${item.name} (${item.size}), `;
                list.innerHTML += `<li style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
                    <span>${item.name} (${item.size}) - ${item.price.toFixed(2)} €</span>
                    <button class="remove-btn" onclick="removeFromCart(${index})">X</button>
                </li>`;
            });
            const tTotal = translations[currentLang] ? translations[currentLang].total : "Gesamt";
            document.getElementById('cart-total').innerText = `${tTotal}: ${total.toFixed(2)} €`;
            const encodedSummary = encodeURIComponent("robi-twice Shop: " + itemSummary);
            document.getElementById('paypal-link').href = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=bananielheinrich@gmail.com&amount=${total.toFixed(2)}&currency_code=EUR&item_name=${encodedSummary}`;
        }

        async function sendSupportTicket() {
            const status = document.getElementById('ticket-status'); status.innerText = "...";
            const response = await fetch("https://formspree.io/f/xlgpdoak", {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: document.getElementById('cust-email').value, Betreff: document.getElementById('support-issue').value, Nachricht: document.getElementById('cust-msg').value })
            });
            if (response.ok) { status.innerText = "Sended! (OK)"; }
        }
    </script>
</body>
</html>
