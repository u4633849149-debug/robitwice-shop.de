<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robi-twice | Official Merch & Live</title>
    <style>
        /* --- DESIGN & BACKGROUND --- */
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; background-color: #000; color: #fff; overflow-x: hidden;
            background-image: url('logo.png'); background-repeat: repeat; 
            background-position: center; background-size: 160px; background-attachment: fixed;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.92); z-index: -1;
        }

        /* --- NAVIGATION --- */
        header { 
            background-color: #111; padding: 15px 5%; display: flex; 
            justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #5c8d67;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }
        .nav-btn { 
            background-color: #2a2a2a; color: white; padding: 10px 20px; 
            border: 1px solid #444; border-radius: 8px; cursor: pointer; 
            font-weight: bold; transition: 0.3s; font-size: 14px;
        }
        .nav-btn:hover { background-color: #5c8d67; border-color: #fff; transform: translateY(-2px); }
        .logo-nav { 
            font-size: 28px; font-weight: bold; cursor: pointer; 
            position: absolute; left: 50%; transform: translateX(-50%);
            text-shadow: 0 0 15px #5c8d67; letter-spacing: 2px;
        }

        /* --- VIDEO AREA --- */
        .video-wrapper { 
            display: flex; justify-content: center; align-items: center; 
            gap: 25px; max-width: 1400px; margin: 40px auto; flex-wrap: wrap; padding: 0 20px;
        }
        .side-vid { 
            flex: 1; min-width: 300px; max-width: 380px; aspect-ratio: 16/9; 
            background: #111; border: 2px solid #333; border-radius: 12px; overflow: hidden;
        }
        .main-stream { 
            flex: 2; min-width: 350px; max-width: 850px; aspect-ratio: 16/9; 
            border: 3px solid #5c8d67; border-radius: 15px; overflow: hidden; 
            position: relative; animation: glow-pulse 2s infinite alternate;
        }
        @keyframes glow-pulse { from { box-shadow: 0 0 10px rgba(92, 141, 103, 0.2); } to { box-shadow: 0 0 35px rgba(92, 141, 103, 0.7); } }
        
        #offline-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 10; display: none; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
        }
        .neon-msg { color: #fff; text-shadow: 0 0 10px #5c8d67, 0 0 30px #5c8d67; font-size: 2rem; font-weight: bold; }

        /* --- SHOP SECTIONS --- */
        .page-section { display: none; padding: 60px 5%; animation: fadeIn 0.5s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        .product-card { background: rgba(25, 25, 25, 0.95); border: 1px solid #333; border-radius: 20px; overflow: hidden; transition: 0.3s; }
        .img-box { width: 100%; height: 350px; background: #fff; display: flex; justify-content: center; align-items: center; }
        .img-box img { max-width: 85%; max-height: 85%; object-fit: contain; }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #0b0b0b; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        .action-btn { width: 100%; padding: 15px; background: #5c8d67; color: #fff; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }

        iframe { width: 100%; height: 100%; border: none; }
        footer { text-align: center; padding: 50px; color: #555; border-top: 1px solid #1a1a1a; }
    </style>
</head>
<body>

    <header>
        <div>
            <button class="nav-btn" onclick="showSection('home')">LIVE</button>
            <button class="nav-btn" onclick="showSection('shop')">MERCH</button>
        </div>
        <div class="logo-nav" onclick="showSection('home')">robi-twice</div>
        <div>
            <button class="nav-btn" onclick="showSection('support')">SUPPORT</button>
            <button class="nav-btn" onclick="showSection('cart')">🛒 <span id="cart-count">0</span></button>
        </div>
    </header>

    <section id="home" class="page-section active">
        <h2 style="text-align: center; color: #5c8d67;">LATEST CONTENT</h2>
        <div class="video-wrapper">
            <div class="side-vid" id="vid-left"><p style="text-align:center; padding-top:20%;">Suche Video...</p></div>
            <div class="main-stream">
                <iframe src="https://www.youtube.com/embed/live_stream?channel=UCm8u2eBf67RCH16p2oA9uSQ" allowfullscreen></iframe>
                <div id="offline-overlay">
                    <div class="neon-msg">🔴 OFFLINE</div>
                    <p style="color: #888;">robi-twice ist gerade nicht live</p>
                </div>
            </div>
            <div class="side-vid" id="vid-right"><p style="text-align:center; padding-top:20%;">Suche Video...</p></div>
        </div>
    </section>

    <section id="shop" class="page-section">
        <h1 style="text-align: center;">SHOP</h1>
        <div class="product-grid">
            <div class="product-card">
                <div class="img-box"><img src="tshirt.jpg"></div>
                <div style="padding:20px; text-align:center;">
                    <h3>Signature T-Shirt</h3>
                    <p style="color:#5c8d67; font-weight:bold;">29,90 €</p>
                    <select id="s1"><option>S</option><option>M</option><option>L</option><option>XL</option></select>
                    <button class="action-btn" onclick="addToCart('Shirt', 29.90, 's1')">In den Warenkorb</button>
                </div>
            </div>
            <div class="product-card">
                <div class="img-box"><img src="hoodie.png"></div>
                <div style="padding:20px; text-align:center;">
                    <h3>Logo Hoodie</h3>
                    <p style="color:#5c8d67; font-weight:bold;">49,90 €</p>
                    <select id="s2"><option>M</option><option>L</option><option>XL</option></select>
                    <button class="action-btn" onclick="addToCart('Hoodie', 49.90, 's2')">In den Warenkorb</button>
                </div>
            </div>
        </div>
    </section>

    <section id="support" class="page-section">
        <div style="max-width: 500px; margin: auto; background: rgba(20,20,20,0.9); padding: 30px; border-radius: 15px;">
            <h2 style="text-align:center;">Support</h2>
            <form action="https://formspree.io/f/xlgpdoak" method="POST">
                <input type="email" name="email" placeholder="Deine E-Mail" required>
                <textarea name="message" rows="5" placeholder="Deine Nachricht..." required></textarea>
                <button type="submit" class="action-btn">ABSENDEN</button>
            </form>
        </div>
    </section>

    <section id="cart" class="page-section">
        <div style="max-width: 700px; margin: auto; background: rgba(20,20,20,0.95); padding: 35px; border-radius: 20px; border: 2px solid #5c8d67;">
            <h2>DEIN WARENKORB</h2>
            <div id="cart-list">Warenkorb ist leer.</div>
            <h3 id="total-sum">Gesamt: 0,00 €</h3>

            <div id="checkout-area" style="display:none; margin-top:20px; border-top:1px solid #333; padding-top:20px;">
                <h3>LIEFERADRESSE</h3>
                <form id="order-form">
                    <input type="text" name="Full_Name" placeholder="Name" required>
                    <input type="text" name="Street" placeholder="Straße & Hausnummer" required>
                    <input type="text" name="City" placeholder="PLZ & Stadt" required>
                    <input type="email" name="Customer_Email" placeholder="Deine E-Mail" required>
                    <input type="hidden" name="Items" id="hidden-items">
                    <button type="submit" id="final-btn" class="action-btn" style="background:#5c8d67; margin-top:10px;">DATEN BESTÄTIGEN & ZU PAYPAL</button>
                </form>
            </div>
            <button id="start-btn" class="action-btn" style="margin-top:20px;" onclick="showAddress()">ZUR KASSE</button>
        </div>
    </section>

    <footer>&copy; 2026 robi-twice Official</footer>

    <script>
        let cart = [];

        function showSection(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        async function loadYT() {
            const channelId = "UCm8u2eBf67RCH16p2oA9uSQ";
            const api = `https://api.allorigins.win/get?url=${encodeURIComponent('https://www.youtube.com/feeds/videos.xml?channel_id=' + channelId)}`;
            try {
                const res = await fetch(api);
                const d = await res.json();
                const parser = new DOMParser();
                const xml = parser.parseFromString(d.contents, "text/xml");
                const entries = xml.getElementsByTagName("entry");
                if(entries.length >= 2) {
                    const id1 = entries[0].getElementsByTagName("yt:videoId")[0].textContent;
                    const id2 = entries[1].getElementsByTagName("yt:videoId")[0].textContent;
                    document.getElementById('vid-left').innerHTML = `<iframe src="https://www.youtube.com/embed/${id1}"></iframe>`;
                    document.getElementById('vid-right').innerHTML = `<iframe src="https://www.youtube.com/embed/${id2}"></iframe>`;
                    const title = entries[0].getElementsByTagName("title")[0].textContent.toLowerCase();
                    document.getElementById('offline-overlay').style.display = (title.includes("live") || title.includes("stream")) ? 'none' : 'flex';
                }
            } catch(e) { document.getElementById('offline-overlay').style.display = 'flex'; }
        }

        function addToCart(n, p, sId) {
            cart.push({name: n, price: p, size: document.getElementById(sId).value});
            updateCart();
            // Kein Popup mehr hier!
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-list');
            let total = 0;
            if(cart.length === 0) list.innerHTML = "Warenkorb ist leer.";
            else {
                list.innerHTML = cart.map((item, i) => {
                    total += item.price;
                    return `<div style="padding:10px 0; border-bottom:1px solid #222;">${item.name} (${item.size}) - ${item.price.toFixed(2)} €</div>`;
                }).join('');
            }
            document.getElementById('total-sum').innerText = `Gesamt: ${total.toFixed(2)} €`;
        }

        function showAddress() {
            if(cart.length === 0) return alert("Warenkorb leer!");
            document.getElementById('checkout-area').style.display = 'block';
            document.getElementById('start-btn').style.display = 'none';
        }

        document.getElementById('order-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('final-btn');
            btn.innerText = "Sende Daten...";
            
            const summary = cart.map(i => `${i.name} (${i.size})`).join(', ');
            document.getElementById('hidden-items').value = summary;

            const res = await fetch("https://formspree.io/f/xlgpdoak", {
                method: "POST",
                body: new FormData(this),
                headers: { 'Accept': 'application/json' }
            });

            if (res.ok) {
                // Hier der aktualisierte Text mit "uns"
                alert("Danke! Deine Lieferadresse wurde an uns gesendet. Jetzt schließe bitte die Zahlung über PayPal ab.");
                const total = cart.reduce((a, b) => a + b.price, 0).toFixed(2);
                window.location.href = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=bananielheinrich@gmail.com&amount=${total}&currency_code=EUR&item_name=robi-twice: ${summary}`;
            } else {
                alert("Fehler beim Senden.");
                btn.innerText = "DATEN BESTÄTIGEN & ZU PAYPAL";
            }
        });

        window.onload = loadYT;
    </script>
</body>
</html>
