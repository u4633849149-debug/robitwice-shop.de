<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robi-twice | Live & Shop</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: #000; color: #fff; overflow-x: hidden; }
        header { background-color: #1a1a1a; color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .nav-left, .nav-right { display: flex; gap: 10px; align-items: center; }
        .logo-nav { font-size: 24px; font-weight: bold; cursor: pointer; text-transform: lowercase; position: absolute; left: 50%; transform: translateX(-50%); }
        
        /* Dropdowns */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { 
            display: block; position: absolute; background-color: #1a1a1a; min-width: 150px; 
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5); z-index: 100; border-radius: 4px; border: 1px solid #333;
            opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.3s ease-in-out; pointer-events: none;
        }
        .dropdown:hover .dropdown-content { opacity: 1; visibility: visible; transform: translateY(0); pointer-events: auto; }
        .dropdown-content::before { content: ""; position: absolute; top: -15px; left: 0; width: 100%; height: 15px; }
        .dropdown-content button { color: white; padding: 12px 16px; display: block; width: 100%; border: none; background: none; text-align: left; cursor: pointer; font-size: 14px; }
        .dropdown-content button:hover { background-color: #333; color: #5c8d67; }

        .nav-btn { background-color: #333; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.3s; }
        .btn-lang-main { background-color: #5c8d67 !important; }
        .cart-count { background: #5c8d67; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px; margin-left: 5px; }

        /* Zoom */
        .product-image-container { background: #f5f5f5; height: 400px; display: flex; justify-content: center; align-items: center; overflow: hidden; cursor: crosshair; }
        .product-image { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.1s ease-out; transform-origin: center center; }

        .page-section { display: none; padding: 40px 5%; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; justify-content: center; }
        .product-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; padding-bottom: 20px; max-width: 400px; margin: auto; }
        .product-info { padding: 20px; text-align: left; }
        .price { font-size: 22px; color: #5c8d67; font-weight: bold; }
        
        select, input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #000; color: white; border: 1px solid #333; border-radius: 5px; }
        .btn-add { display: block; width: 100%; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; background-color: #5c8d67; color: white; border: none; }
        .footer { background-color: #111; color: #777; padding: 40px 5%; text-align: center; border-top: 1px solid #333; font-size: 14px; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <div class="dropdown">
                <button class="nav-btn" id="label-prod-nav">Produkte ▾</button>
                <div class="dropdown-content">
                    <button onclick="showSection('shirts-section')" id="label-drop-shirts">Shirts</button>
                    <button onclick="showSection('pullover-section')" id="label-drop-hoodies">Pullover</button>
                    <button onclick="showSection('hats-section')" id="label-drop-hats">Mützen</button>
                </div>
            </div>
            <button class="nav-btn" onclick="showSection('home')">🏠 Live</button>
        </div>
        <div class="logo-nav" onclick="showSection('home')">robi-twice</div>
        <div class="nav-right">
            <button class="nav-btn" onclick="showSection('support-section')" id="label-support-nav">Support</button>
            <div class="dropdown">
                <button class="nav-btn btn-lang-main" id="label-lang-nav">Sprache ▾</button>
                <div class="dropdown-content" style="right: 0;">
                    <button onclick="changeLanguage('de')">Deutsch 🇩🇪</button>
                    <button onclick="changeLanguage('en')">English 🇺🇸</button>
                    <button onclick="changeLanguage('es')">Español 🇪🇸</button>
                    <button onclick="changeLanguage('fr')">Français 🇫🇷</button>
                </div>
            </div>
            <button class="nav-btn" onclick="showSection('cart-section')">🛒 <span id="cart-counter" class="cart-count">0</span></button>
        </div>
    </header>

    <section id="home" class="page-section active">
        <h1 id="home-title">robi-twice Live</h1>
        <div style="max-width: 800px; margin: auto; aspect-ratio: 16/9;">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/live_stream?channel=UCm8u2eBf67RCH16p2oA9uSQ" frameborder="0" allowfullscreen></iframe>
        </div>
    </section>

    <section id="shirts-section" class="page-section">
        <div class="product-grid"><div class="product-card">
            <div class="product-image-container" onmousemove="interactiveZoom(event)" onmouseleave="resetZoom(event)"><img src="tshirt.jpg" class="product-image"></div>
            <div class="product-info">
                <h3 id="p-name-shirt">robi-twice Signature Tee</h3>
                <p class="price">30,00 €</p>
                <select id="size-shirt"><option>S</option><option>M</option><option>L</option><option>XL</option></select>
                <button class="btn-add" onclick="addToCart('Signature Tee', 30.00, 'size-shirt')" id="btn-add-shirt">In den Warenkorb</button>
            </div>
        </div></div>
    </section>

    <section id="pullover-section" class="page-section">
        <div class="product-grid"><div class="product-card">
            <div class="product-image-container" onmousemove="interactiveZoom(event)" onmouseleave="resetZoom(event)"><img src="hoodie.png" class="product-image"></div>
            <div class="product-info">
                <h3 id="p-name-hoodie">robi-twice Logo Hoodie</h3>
                <p class="price">40,00 €</p>
                <select id="size-hoodie"><option>S</option><option>M</option><option>L</option><option>XL</option></select>
                <button class="btn-add" onclick="addToCart('Logo Hoodie', 40.00, 'size-hoodie')" id="btn-add-hoodie">In den Warenkorb</button>
            </div>
        </div></div>
    </section>

    <section id="hats-section" class="page-section">
        <div class="product-grid"><div class="product-card">
            <div class="product-image-container" onmousemove="interactiveZoom(event)" onmouseleave="resetZoom(event)"><img src="muetze.png" class="product-image"></div>
            <div class="product-info">
                <h3 id="p-name-hat">robi-twice Logo Beanie</h3>
                <p class="price">17,00 €</p>
                <select id="size-hat"><option>OS</option></select>
                <button class="btn-add" onclick="addToCart('Logo Beanie', 17.00, 'size-hat')" id="btn-add-hat">In den Warenkorb</button>
            </div>
        </div></div>
    </section>

    <section id="support-section" class="page-section">
        <div style="max-width: 500px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333;">
            <h1 id="support-title">Support</h1>
            <input type="email" id="cust-email" placeholder="E-Mail">
            <textarea id="cust-msg" rows="4" placeholder="Nachricht"></textarea>
            <button class="btn-add" onclick="sendSupportTicket()" id="btn-send-support">Senden</button>
            <p id="ticket-status" style="margin-top:10px; color:#5c8d67;"></p>
        </div>
    </section>

    <section id="cart-section" class="page-section">
        <div style="max-width: 600px; margin: auto;">
            <h1 id="cart-title">Warenkorb</h1>
            <ul id="cart-items" style="list-style:none; padding:0;"></ul>
            <h3 id="cart-total">Gesamt: 0,00 €</h3>
            <a id="paypal-link" href="#" style="display:block; background:#0070ba; color:white; padding:15px; border-radius:30px; text-decoration:none; text-align:center; font-weight:bold;">PayPal Checkout</a>
        </div>
    </section>

    <footer class="footer">
        <p><strong>Impressum:</strong> Bananiel Heinrich, 46a Brüggen, 41379 Deutschland.</p>
    </footer>

    <script>
        let cart = [];
        let currentLang = 'de';

        const texts = {
            de: { prod: "Produkte ▾", shirts: "Shirts", hoodies: "Pullover", hats: "Mützen", support: "Support", lang: "Sprache ▾", home: "robi-twice Live", cart: "Warenkorb", total: "Gesamt", add: "In den Warenkorb", send: "Senden", pShirt: "robi-twice Signature Tee", pHoodie: "robi-twice Logo Hoodie", pHat: "robi-twice Logo Beanie" },
            en: { prod: "Products ▾", shirts: "T-Shirts", hoodies: "Hoodies", hats: "Beanies", support: "Support", lang: "Language ▾", home: "robi-twice Live", cart: "Your Cart", total: "Total", add: "Add to Cart", send: "Send", pShirt: "robi-twice Signature Tee", pHoodie: "robi-twice Logo Hoodie", pHat: "robi-twice Logo Beanie" },
            es: { prod: "Productos ▾", shirts: "Camisetas", hoodies: "Sudaderas", hats: "Gorros", support: "Soporte", lang: "Idioma ▾", home: "robi-twice en Vivo", cart: "Carrito", total: "Total", add: "Añadir al carrito", send: "Enviar", pShirt: "Camiseta Signature", pHoodie: "Sudadera Logo", pHat: "Gorro Logo" },
            fr: { prod: "Produits ▾", shirts: "T-Shirts", hoodies: "Pulls", hats: "Bonnets", support: "Support", lang: "Langue ▾", home: "robi-twice en Direct", cart: "Panier", total: "Total", add: "Ajouter au panier", send: "Envoyer", pShirt: "T-Shirt Signature", pHoodie: "Sweat à capuche", pHat: "Bonnet Logo" }
        };

        function changeLanguage(lang) {
            currentLang = lang;
            const t = texts[lang];
            // Navigation
            document.getElementById('label-prod-nav').innerText = t.prod;
            document.getElementById('label-drop-shirts').innerText = t.shirts;
            document.getElementById('label-drop-hoodies').innerText = t.hoodies;
            document.getElementById('label-drop-hats').innerText = t.hats;
            document.getElementById('label-support-nav').innerText = t.support;
            document.getElementById('label-lang-nav').innerText = t.lang;
            
            // Produkt Namen & Buttons
            document.getElementById('p-name-shirt').innerText = t.pShirt;
            document.getElementById('p-name-hoodie').innerText = t.pHoodie;
            document.getElementById('p-name-hat').innerText = t.pHat;
            document.getElementById('btn-add-shirt').innerText = t.add;
            document.getElementById('btn-add-hoodie').innerText = t.add;
            document.getElementById('btn-add-hat').innerText = t.add;

            // Andere Texte
            document.getElementById('home-title').innerText = t.home;
            document.getElementById('support-title').innerText = t.support;
            document.getElementById('cart-title').innerText = t.cart;
            document.getElementById('btn-send-support').innerText = t.send;
            updateCartDisplay();
        }

        function interactiveZoom(e) {
            const container = e.currentTarget;
            const img = container.querySelector('img');
            const rect = container.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / container.offsetWidth) * 100;
            const y = ((e.clientY - rect.top) / container.offsetHeight) * 100;
            img.style.transformOrigin = `${x}% ${y}%`;
            img.style.transform = "scale(2.5)";
        }

        function resetZoom(e) { e.currentTarget.querySelector('img').style.transform = "scale(1)"; }

        function showSection(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'cart-section') updateCartDisplay();
            window.scrollTo(0,0);
        }

        function addToCart(name, price, sizeId) {
            const size = document.getElementById(sizeId).value;
            cart.push({ name, price, size });
            document.getElementById('cart-counter').innerText = cart.length;
            alert(name + " +1");
        }

        function updateCartDisplay() {
            const list = document.getElementById('cart-items');
            let total = 0; list.innerHTML = "";
            cart.forEach(item => {
                total += item.price;
                list.innerHTML += `<li style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between;"><span>${item.name} (${item.size})</span><span>${item.price.toFixed(2)} €</span></li>`;
            });
            document.getElementById('cart-total').innerText = `${texts[currentLang].total}: ${total.toFixed(2)} €`;
            document.getElementById('paypal-link').href = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=bananielheinrich@gmail.com&amount=${total.toFixed(2)}&currency_code=EUR`;
        }

        async function sendSupportTicket() {
            const status = document.getElementById('ticket-status');
            status.innerText = "...";
            const response = await fetch("https://formspree.io/f/xlgpdoak", {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: document.getElementById('cust-email').value, msg: document.getElementById('cust-msg').value })
            });
            if (response.ok) { status.innerText = "OK!"; }
        }
    </script>
</body>
</html>
