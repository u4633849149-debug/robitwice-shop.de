<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robi-twice | Live & Shop</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: #000; color: #fff; overflow-x: hidden; }
        header { background-color: #1a1a1a; color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .nav-left, .nav-right { display: flex; gap: 10px; align-items: center; }
        .logo-nav { font-size: 24px; font-weight: bold; cursor: pointer; text-transform: lowercase; position: absolute; left: 50%; transform: translateX(-50%); }
        
        /* Dropdowns */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { 
            display: block; position: absolute; background-color: #1a1a1a; min-width: 150px; 
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5); z-index: 100; border-radius: 4px; border: 1px solid #333;
            opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.3s ease-in-out; pointer-events: none;
        }
        .dropdown:hover .dropdown-content { opacity: 1; visibility: visible; transform: translateY(0); pointer-events: auto; }
        .dropdown-content button { color: white; padding: 12px 16px; display: block; width: 100%; border: none; background: none; text-align: left; cursor: pointer; font-size: 14px; }
        .dropdown-content button:hover { background-color: #333; color: #5c8d67; }

        .nav-btn { background-color: #333; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-lang-main { background-color: #5c8d67 !important; }
        .cart-count { background: #5c8d67; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px; margin-left: 5px; }

        /* Video Layout (Home) */
        .video-container-main { display: flex; justify-content: center; align-items: center; gap: 20px; max-width: 1400px; margin: 20px auto; flex-wrap: wrap; }
        
        .side-video-box { 
            flex: 1; min-width: 280px; max-width: 350px; aspect-ratio: 16/9; background: #111; border: 2px solid #444; border-radius: 12px; overflow: hidden; 
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); transition: 0.3s;
        }
        .side-video-box:hover { transform: scale(1.02); box-shadow: 0 0 25px rgba(255, 255, 255, 0.3); border-color: #fff; }

        .main-stream-center { 
            flex: 2; min-width: 320px; max-width: 850px; aspect-ratio: 16/9; border: 2px solid #5c8d67; border-radius: 12px; overflow: hidden; 
            position: relative; animation: live-glow 2s infinite alternate;
        }
        @keyframes live-glow {
            from { box-shadow: 0 0 10px rgba(92, 141, 103, 0.3); }
            to { box-shadow: 0 0 25px rgba(92, 141, 103, 0.8); border-color: #7ab387; }
        }

        /* Neon Offline Overlay */
        #offline-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; 
            z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .neon-text {
            color: #fff; text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #5c8d67, 0 0 30px #5c8d67, 0 0 40px #5c8d67;
            font-size: 1.5rem; font-weight: bold; margin: 10px;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* Produkte & Sections */
        .page-section { display: none; padding: 40px 5%; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; justify-content: center; }
        .product-card { background: #1a1a1a; border-radius: 12px; border: 1px solid #333; padding-bottom: 20px; max-width: 400px; margin: auto; text-align: center; overflow: hidden; }
        .product-image-container { background: #f5f5f5; height: 400px; display: flex; justify-content: center; align-items: center; overflow: hidden; cursor: crosshair; }
        .product-image { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.1s ease-out; transform-origin: center center; }
        .price { font-size: 22px; color: #5c8d67; font-weight: bold; margin-bottom: 10px; display: block; }
        
        select, input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: white; border: 1px solid #333; border-radius: 5px; box-sizing: border-box; }
        .btn-add { display: block; width: 100%; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; background-color: #5c8d67; color: white; border: none; }
        
        @media (max-width: 1000px) {
            .side-video-box { max-width: 100%; width: 90%; flex: none; }
            .main-stream-center { order: -1; width: 100%; flex: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <div class="dropdown">
                <button class="nav-btn lang-nav-prod">Produkte ▾</button>
                <div class="dropdown-content">
                    <button onclick="showSection('shirts-section')" class="lang-drop-shirts">Shirts</button>
                    <button onclick="showSection('pullover-section')" class="lang-drop-hoodies">Pullover</button>
                    <button onclick="showSection('hats-section')" class="lang-drop-hats">Mützen</button>
                </div>
            </div>
            <button class="nav-btn" onclick="showSection('home')">🏠 Live</button>
        </div>
        <div class="logo-nav" onclick="showSection('home')">robi-twice</div>
        <div class="nav-right">
            <button class="nav-btn lang-nav-support" onclick="showSection('support-section')">Support</button>
            <div class="dropdown">
                <button class="nav-btn btn-lang-main lang-nav-lang">Sprache ▾</button>
                <div class="dropdown-content" style="right: 0;">
                    <button onclick="changeLanguage('de')">Deutsch 🇩🇪</button>
                    <button onclick="changeLanguage('en')">English 🇺🇸</button>
                </div>
            </div>
            <button class="nav-btn" onclick="showSection('cart-section')">🛒 <span id="cart-counter" class="cart-count">0</span></button>
        </div>
    </header>

    <section id="home" class="page-section active">
        <h1 class="lang-home-title" style="text-align: center;">robi-twice Live & Latest</h1>
        <div class="video-container-main">
            <div class="side-video-box" id="latest-vid-1"><p style="text-align:center; padding-top:20%; color:#555;">Lädt Video...</p></div>
            
            <div class="main-stream-center">
                <iframe id="live-iframe" src="https://www.youtube.com/embed/live_stream?channel=UCm8u2eBf67RCH16p2oA9uSQ" allowfullscreen></iframe>
                <div id="offline-overlay">
                    <div class="neon-text">🔴 robi-twice</div>
                    <div class="neon-text">streamt gerade nicht</div>
                    <p style="color: #777; margin-top: 15px;">Schau dir meine neuesten Videos an!</p>
                </div>
            </div>

            <div class="side-video-box" id="latest-vid-2"><p style="text-align:center; padding-top:20%; color:#555;">Lädt Video...</p></div>
        </div>
    </section>

    <section id="shirts-section" class="page-section">
        <div class="product-grid"><div class="product-card">
            <div class="product-image-container" onmousemove="interactiveZoom(event)" onmouseleave="resetZoom(event)"><img src="tshirt.jpg" class="product-image"></div>
            <div class="product-info"><h3>Signature Shirt</h3><span class="price">30,00 €</span>
                <select id="size-shirt"><option>S</option><option>M</option><option>L</option><option>XL</option></select>
                <button class="btn-add" onclick="addToCart('Signature Shirt', 30.00, 'size-shirt')">In den Warenkorb</button>
            </div>
        </div></div>
    </section>

    <section id="pullover-section" class="page-section">
        <div class="product-grid"><div class="product-card">
            <div class="product-image-container" onmousemove="interactiveZoom(event)" onmouseleave="resetZoom(event)"><img src="hoodie.png" class="product-image"></div>
            <div class="product-info"><h3>Logo Hoodie</h3><span class="price">40,00 €</span>
                <select id="size-hoodie"><option>S</option><option>M</option><option>L</option><option>XL</option></select>
                <button class="btn-add" onclick="addToCart('Logo Hoodie', 40.00, 'size-hoodie')">In den Warenkorb</button>
            </div>
        </div></div>
    </section>

    <section id="hats-section" class="page-section">
        <div class="product-grid"><div class="product-card">
            <div class="product-image-container" onmousemove="interactiveZoom(event)" onmouseleave="resetZoom(event)"><img src="muetze.png" class="product-image"></div>
            <div class="product-info"><h3>Logo Mütze</h3><span class="price">17,00 €</span>
                <select id="size-hat"><option>Einheitsgröße (OS)</option></select>
                <button class="btn-add" onclick="addToCart('Logo Mütze', 17.00, 'size-hat')">In den Warenkorb</button>
            </div>
        </div></div>
    </section>

    <section id="support-section" class="page-section">
        <div style="max-width: 500px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333;">
            <h1>Support</h1>
            <label style="font-size: 14px; color: #777;">Was ist das Problem?</label>
            <select id="support-issue">
                <option value="Defekt">Defekt / Beschädigt</option>
                <option value="Falsche Bestellung">Falsche Größe/Farbe bestellt</option>
                <option value="Nicht gefallen">Gefällt mir nicht</option>
                <option value="Versand">Frage zum Versand</option>
                <option value="Sonstiges">Sonstiges</option>
            </select>
            <input type="email" id="cust-email" placeholder="E-Mail">
            <textarea id="cust-msg" rows="5" placeholder="Nachricht"></textarea>
            <button class="btn-add" onclick="sendSupportTicket()">Senden</button>
            <p id="ticket-status" style="margin-top:10px; color:#5c8d67;"></p>
        </div>
    </section>

    <section id="cart-section" class="page-section">
        <div style="max-width: 600px; margin: auto;">
            <h1>Warenkorb</h1>
            <ul id="cart-items" style="list-style:none; padding:0;"></ul>
            <h3 id="cart-total">Gesamt: 0,00 €</h3>
            <a id="paypal-link" href="#" style="display:block; background:#0070ba; color:white; padding:15px; border-radius:30px; text-decoration:none; text-align:center; font-weight:bold;">PayPal Checkout</a>
        </div>
    </section>

    <script>
        let cart = [];
        let currentLang = 'de';

        // 1. YouTube Videos & Live Status laden
        async function loadYTData() {
            const channelId = "UCm8u2eBf67RCH16p2oA9uSQ";
            const rssUrl = encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`);
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                // Neueste Videos in die Side-Boxes
                if (data.items && data.items.length >= 2) {
                    const id1 = data.items[0].link.split('v=')[1];
                    const id2 = data.items[1].link.split('v=')[1];
                    document.getElementById('latest-vid-1').innerHTML = `<iframe src="https://www.youtube.com/embed/${id1}" allowfullscreen></iframe>`;
                    document.getElementById('latest-vid-2').innerHTML = `<iframe src="https://www.youtube.com/embed/${id2}" allowfullscreen></iframe>`;
                }

                // Live Status Check (Prüft ob das erste Video ein aktueller Stream ist)
                // YouTube API ist hier streng, wir machen einen einfachen Check:
                // Wenn du live gehst, wird das Overlay manuell oder durch "live" im Titel ausgeblendet.
                const isLiveNow = data.items[0].title.toLowerCase().includes("live"); 
                if(!isLiveNow) {
                    document.getElementById('offline-overlay').style.display = 'flex';
                } else {
                    document.getElementById('offline-overlay').style.display = 'none';
                }

            } catch (e) { console.error("YT Fehler", e); }
        }

        // 2. Shop Funktionen
        function showSection(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function addToCart(name, price, sizeId) {
            const size = document.getElementById(sizeId).value;
            cart.push({ name, price, size });
            document.getElementById('cart-counter').innerText = cart.length;
            updateCartDisplay();
            alert("Hinzugefügt!");
        }

        function updateCartDisplay() {
            const list = document.getElementById('cart-items');
            let total = 0; let itemSummary = "";
            list.innerHTML = "";
            cart.forEach((item, index) => {
                total += item.price;
                itemSummary += `${item.name} (${item.size}), `;
                list.innerHTML += `<li style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
                    <span>${item.name} (${item.size}) - ${item.price.toFixed(2)} €</span>
                    <button onclick="cart.splice(${index},1); updateCartDisplay();" class="nav-btn" style="background:red;">X</button>
                </li>`;
            });
            document.getElementById('cart-total').innerText = `Gesamt: ${total.toFixed(2)} €`;
            document.getElementById('paypal-link').href = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=bananielheinrich@gmail.com&amount=${total.toFixed(2)}&currency_code=EUR&item_name=${encodeURIComponent(itemSummary)}`;
        }

        async function sendSupportTicket() {
            const status = document.getElementById('ticket-status');
            status.innerText = "Sende...";
            const response = await fetch("https://formspree.io/f/xlgpdoak", {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: document.getElementById('cust-email').value, 
                    Problem: document.getElementById('support-issue').value, 
                    Nachricht: document.getElementById('cust-msg').value 
                })
            });
            if (response.ok) status.innerText = "Erfolgreich gesendet!";
        }

        function interactiveZoom(e) {
            const img = e.currentTarget.querySelector('img');
            const rect = e.currentTarget.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / e.currentTarget.offsetWidth) * 100;
            const y = ((e.clientY - rect.top) / e.currentTarget.offsetHeight) * 100;
            img.style.transformOrigin = `${x}% ${y}%`;
            img.style.transform = "scale(2.5)";
        }
        function resetZoom(e) { e.currentTarget.querySelector('img').style.transform = "scale(1)"; }

        window.addEventListener('load', loadYTData);
    </script>
</body>
</html>
