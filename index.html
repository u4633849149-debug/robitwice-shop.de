<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robi-twice | Live & Shop</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: #000; color: #fff; }
        
        /* Navigation */
        header { 
            background-color: #1a1a1a; 
            color: white; 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #333; 
        }

        .nav-left { display: flex; gap: 15px; align-items: center; }
        
        .logo-nav { font-size: 26px; font-weight: bold; cursor: pointer; text-transform: lowercase; transition: 0.3s; }
        .logo-nav:hover { color: #5c8d67; }
        
        .dropdown { position: relative; display: inline-block; }
        
        /* Buttons Style */
        .nav-btn { 
            background-color: #333; 
            color: white; 
            padding: 10px 18px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        .nav-btn:hover { background-color: #444; }
        .btn-live { background-color: #444; border: 1px solid #ff0000; }

        .dropdown-content { display: none; position: absolute; background-color: #222; min-width: 160px; box-shadow: 0px 8px 16px rgba(0,0,0,0.5); border-radius: 4px; }
        .dropdown-content a { color: white; padding: 12px 16px; text-decoration: none; display: block; border-bottom: 1px solid #333; cursor: pointer; }
        .dropdown-content a:hover { background-color: #333; }
        .dropdown:hover .dropdown-content { display: block; }

        /* Sektions-Logik */
        .page-section { display: none; padding: 40px 5%; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* STARTSEITE: Live Stream */
        #home { text-align: center; }
        .stream-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 1000px; margin: 20px auto; border: 2px solid #333; border-radius: 8px; background: #111; }
        .stream-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .status-badge { display: inline-block; padding: 5px 15px; background-color: #ff0000; border-radius: 20px; font-weight: bold; margin-bottom: 10px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Shop Design */
        .container { max-width: 1100px; margin: 0 auto; text-align: center; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .product-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .product-image { width: 100%; height: 450px; object-fit: cover; }
        .product-info { padding: 20px; text-align: left; }
        .price { font-size: 20px; color: #5c8d67; font-weight: bold; }
        .btn-buy { display: block; width: 90%; margin: 15px auto; padding: 12px; border-radius: 25px; cursor: pointer; text-align: center; font-weight: bold; background-color: #5c8d67; color: white; border: none; transition: 0.3s; }
        .btn-buy:hover { background-color: #4a7354; }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <div class="dropdown">
                <button class="nav-btn">Produkte ▼</button>
                <div class="dropdown-content">
                    <a onclick="showSection('shirts-section')">— Shirts</a>
                    <a onclick="showSection('pullover-section')">— Pullover</a>
                </div>
            </div>

            <button class="nav-btn btn-live" onclick="showSection('home')">🏠 Live Stream</button>
        </div>

        <div class="logo-nav" onclick="showSection('home')">robi-twice</div>
    </header>

    <section id="home" class="page-section active">
        <div class="status-badge">LIVE</div>
        <h1>robi-twice Live Stream</h1>
        <div class="stream-container">
            <iframe src="https://www.youtube.com/embed/live_stream?channel=DEINE_KANAL_ID" frameborder="0" allowfullscreen></iframe>
        </div>
        <p>Willkommen! Schau mir live zu und check meine exklusiven Drops aus.</p>
    </section>

    <section id="shirts-section" class="page-section">
        <div class="container">
            <h1>Shirts Kollektion</h1>
            <div class="product-grid">
                <div class="product-card">
                    <img src="tshirt.png" class="product-image">
                    <div class="product-info">
                        <h3>robi-twice Signature Tee</h3>
                        <p class="price">29,99 €</p>
                        <button class="btn-buy">In den Warenkorb legen</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="pullover-section" class="page-section">
        <div class="container">
            <h1>Pullover & Hoodies</h1>
            <div class="product-grid">
                <div class="product-card">
                    <img src="hoodie.png" class="product-image">
                    <div class="product-info">
                        <h3>robi-twice Logo Hoodie</h3>
                        <p class="price">49,99 €</p>
                        <button class="btn-buy">In den Warenkorb legen</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function showSection(sectionId) {
            const sections = document.querySelectorAll('.page-section');
            sections.forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            window.scrollTo(0, 0);
        }
    </script>

</body>
</html>
