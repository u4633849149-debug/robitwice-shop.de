<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Robi-twice Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <main>
        <h1 class="shop-title">Neu bei robi-twice</h1>
        
        <div class="product-grid">
            <div class="product-card">
                <img src="shirt-bild.jpg" alt="Cooles Shirt">
                <h3>Signature Shirt</h3>
                <p>29,99 €</p>
                <button class="buy-btn">In den Warenkorb</button>
            </div>

            <div class="product-card">
                <img src="pullover-bild.jpg" alt="Warmer Pullover">
                <h3>Logo Hoodie</h3>
                <p>49,99 €</p>
                <button class="buy-btn">In den Warenkorb</button>
            </div>
        </div>
    </main>
        <nav>
            <div class="dropdown">
                <button class="dropbtn">Produkte ▼</button>
                <div class="dropdown-content">
                    <a href="#">Shirts</a>
                    <a href="#">Pullover</a>
                </div>
            </div>
            <div class="logo">robi-force</div>
        </nav>
    </header>

    <main>
        <h1>Willkommen in meinem Shop</h1>
        <p>Hier entstehen bald meine eigenen Sachen.</p>
    </main>

</body>
</html>
