<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robi-twice | Official Shop</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: #fff; color: #333; }
        
        /* Navigation */
        header { background-color: #1a1a1a; color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo-nav { font-size: 24px; font-weight: bold; letter-spacing: -1px; }
        
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { background-color: #444; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .dropdown-content { display: none; position: absolute; background-color: #222; min-width: 160px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        .dropdown-content a { color: white; padding: 12px 16px; text-decoration: none; display: block; border-bottom: 1px solid #333; }
        .dropdown:hover .dropdown-content { display: block; }

        /* Shop Bereich */
        .container { max-width: 1100px; margin: 50px auto; text-align: center; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 20px; }

        /* Produkt Karte mit Logo-Overlay */
        .product-card { background: #f9f9f9; border-radius: 12px; overflow: hidden; border: 1px solid #eee; position: relative; }
        
        .image-container { position: relative; width: 100%; height: 400px; background-color: #f0f0f0; }
        .product-image { width: 100%; height: 100%; object-fit: cover; }

        /* DEIN LOGO AUF DER KLEIDUNG */
        .brand-overlay {
            position: absolute;
            top: 35%; /* Position auf der Brust */
            left: 50%;
            transform: translate(-50%, -50%);
            color: white; /* Weißer Druck auf dunkler Kleidung */
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: lowercase;
            opacity: 0.8;
            pointer-events: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .product-info { padding: 20px; text-align: left; }
        .product-info h3 { margin: 0; font-size: 18px; }
        .product-info p { color: #666; font-size: 20px; margin: 10px 0; font-weight: bold; }

        .btn { display: block; width: 90%; margin: 10px auto; padding: 12px; border: none; border-radius: 25px; cursor: pointer; font-size: 16px; text-align: center; text-decoration: none; transition: 0.3s; }
        .btn-cart { background-color: #5c8d67; color: white; }
        .btn-details { background-color: #444; color: white; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <header>
        <div class="dropdown">
            <button class="dropbtn">Produkte ▼</button>
            <div class="dropdown-content">
                <a href="#">— Shirts</a>
                <a href="#">— Pullover</a>
            </div>
        </div>
        <div class="logo-nav">robi-twice</div>
    </header>

    <div class="container">
        <h1>Neu bei robi-twice</h1>

        <div class="product-grid">
            <div class="product-card">
                <div class="image-container">
                    <img src="https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?q=80&w=600&auto=format&fit=crop" class="product-image">
                    <div class="brand-overlay">robi-twice</div>
                </div>
                <div class="product-info">
                    <h3>robi-twice Signature Tee</h3>
                    <p>29,99 €</p>
                </div>
                <button class="btn btn-cart">In den Warenkorb legen</button>
            </div>

            <div class="product-card">
                <div class="image-container">
                    <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=600&auto=format&fit=crop" class="product-image">
                    <div class="brand-overlay" style="top: 40%;">robi-twice</div>
                </div>
                <div class="product-info">
                    <h3>robi-twice Logo Hoodie</h3>
                    <p>49,99 €</p>
                </div>
                <button class="btn btn-details">Mehr Details</button>
            </div>
        </div>
    </div>

</body>
</html>
