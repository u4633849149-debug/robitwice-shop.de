<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Official robi-twice Brand Experience 2026">
    <title>ROBI-TWICE | OFFICIAL HUB</title>

    <style>
        /* ========================================================================================
           I. GLOBAL DESIGN TOKENS
           ========================================================================================
        */
        :root {
            --brand-green: #5c8d67;
            --brand-green-bright: #7bb589;
            --brand-glow: rgba(92, 141, 103, 0.4);
            
            --bg-deep: #000000;
            --bg-surface: #050505;
            --bg-card: #080808;
            
            --text-main: #ffffff;
            --text-muted: #666666;
            
            --header-h: 120px;
            --radius-lg: 30px;
            --radius-md: 18px;
            
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
            --anim-std: 0.5s;
        }

        /* ========================================================================================
           II. RESET & BASE
           ========================================================================================
        */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        html { background-color: var(--bg-deep); scroll-behavior: smooth; overflow-x: hidden; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: url('logo.png');
            background-repeat: repeat;
            background-size: 170px;
            background-attachment: fixed;
        }

        .dark-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.92) 0%, rgba(0,0,0,1) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* ========================================================================================
           III. HEADER
           ========================================================================================
        */
        header {
            width: 100%;
            height: var(--header-h);
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(30px);
            position: sticky;
            top: 0;
            z-index: 10000;
            border-bottom: 2px solid var(--brand-green);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
        }

        .nav-block { display: flex; align-items: center; gap: 25px; flex: 1; }
        .nav-block.right { justify-content: flex-end; }

        .brand-hub h1 {
            font-size: 38px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 16px;
            cursor: pointer;
            transition: var(--anim-std) var(--ease);
        }

        .brand-hub h1:hover { color: var(--brand-green); letter-spacing: 20px; }

        .nav-btn {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            color: white;
            padding: 15px 30px;
            border-radius: 14px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2.5px;
            cursor: pointer;
            transition: 0.3s var(--ease);
        }

        .nav-btn.active, .nav-btn:hover {
            background: var(--brand-green);
            border-color: #fff;
        }

        .cart-pill {
            background: #fff;
            color: #000;
            padding: 3px 10px;
            border-radius: 7px;
            font-size: 11px;
            font-weight: 900;
            margin-left: 10px;
        }

        /* ========================================================================================
           IV. CONTENT VIEWS
           ========================================================================================
        */
        .app-view { display: none; padding-bottom: 120px; animation: fadeIn 0.7s var(--ease); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* LIVE SECTION */
        .live-container { padding: 60px 0; }
        
        .video-triple-matrix {
            display: grid;
            grid-template-columns: 1fr 2.4fr 1fr;
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 40px;
            align-items: center;
        }

        .v-shell {
            aspect-ratio: 16/9;
            background: #000;
            border-radius: var(--radius-md);
            border: 1px solid #1a1a1a;
            overflow: hidden;
            opacity: 0.45;
            transition: var(--anim-std) var(--ease);
        }

        .v-shell.main {
            opacity: 1;
            border: 4px solid var(--brand-green);
            border-radius: var(--radius-lg);
            box-shadow: 0 0 80px var(--brand-glow);
        }

        iframe { width: 100%; height: 100%; border: none; }

        .ticker-module {
            width: 100%;
            background: var(--brand-green);
            margin-top: 60px;
            padding: 20px 0;
            overflow: hidden;
        }

        .ticker-wrap {
            display: inline-block;
            white-space: nowrap;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 7px;
            animation: tickerFlow 38s linear infinite;
        }

        @keyframes tickerFlow { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* STORE SECTION */
        .store-portal { padding: 80px 5%; max-width: 1600px; margin: 0 auto; }
        
        .portal-header { text-align: center; margin-bottom: 80px; }
        .portal-header h2 { font-size: 60px; font-weight: 900; text-transform: uppercase; letter-spacing: 5px; }

        .grid-engine {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 60px;
        }

        .product-node {
            background: var(--bg-card);
            border: 1px solid #1a1a1a;
            border-radius: var(--radius-lg);
            padding: 45px;
            transition: all var(--anim-std) var(--ease);
            text-align: center;
        }

        .product-node:hover { transform: translateY(-25px); border-color: var(--brand-green); box-shadow: 0 40px 80px rgba(0,0,0,0.8); }

        .visual-container {
            width: 100%; height: 420px;
            background: #ffffff;
            border-radius: var(--radius-md);
            margin-bottom: 35px;
            display: flex; align-items: center; justify-content: center;
        }
        .visual-container img { max-width: 80%; transition: 0.6s var(--ease); }
        .product-node:hover .visual-container img { transform: scale(1.1) rotate(-3deg); }

        .product-title { font-size: 32px; text-transform: uppercase; font-weight: 900; margin-bottom: 12px; }
        .price-tag { font-size: 38px; color: var(--brand-green); font-weight: 900; margin-bottom: 35px; display: block; }

        .size-ui {
            width: 100%; background: #000; border: 1px solid #222; color: #fff;
            padding: 20px; border-radius: 16px; margin-bottom: 25px; font-weight: 800; cursor: pointer;
        }

        .buy-trigger {
            width: 100%; background: var(--brand-green); color: #fff; border: none;
            padding: 24px; border-radius: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; cursor: pointer;
        }

        /* CART SECTION */
        .cart-wrapper { padding: 80px 5%; }
        .cart-container {
            max-width: 1400px; margin: 0 auto; background: #080808; border-radius: var(--radius-lg);
            display: grid; grid-template-columns: 1.5fr 1fr; min-height: 800px; overflow: hidden; border: 1px solid #111;
        }
        .cart-items-section { padding: 70px; border-right: 1px solid #111; }
        .checkout-section { padding: 70px; background: #050505; }

        .cart-item-row { display: flex; justify-content: space-between; align-items: center; padding: 25px 0; border-bottom: 1px solid #111; }
        .input-form { width: 100%; padding: 22px; background: #000; border: 1px solid #222; color: #fff; border-radius: 18px; margin-bottom: 20px; }

        /* FOOTER */
        footer { background: #020202; padding: 120px 0 60px; text-align: center; border-top: 1px solid #111; margin-top: auto; }
        .footer-logo-text { font-size: 65px; font-weight: 900; color: #0d0d0d; text-transform: uppercase; letter-spacing: 40px; margin-bottom: 60px; }

        @media (max-width: 1200px) {
            .video-triple-matrix { grid-template-columns: 1fr; }
            .v-shell:not(.main) { display: none; }
            .cart-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body onload="engine.init()">

    <div class="dark-overlay"></div>

    <header>
        <div class="nav-block">
            <button class="nav-btn active" id="tab-home" onclick="engine.view('home')">Live</button>
            <button class="nav-btn" id="tab-shop" onclick="engine.view('shop')">Store</button>
        </div>

        <div class="brand-hub">
            <h1 onclick="engine.view('home')">robi-twice</h1>
        </div>

        <div class="nav-block right">
            <button class="nav-btn" id="tab-cart" onclick="engine.view('cart')">
                Cart <span class="cart-pill" id="cart-count">0</span>
            </button>
        </div>
    </header>

    <main id="view-home" class="app-view" style="display: block;">
        <section class="live-container">
            <div class="video-triple-matrix">
                <div class="v-shell"><iframe src="https://www.youtube.com/embed/5Mf7S0pDyP0?controls=0&mute=1&autoplay=1&loop=1"></iframe></div>
                <div class="v-shell main"><iframe src="https://www.youtube.com/embed/live_stream?channel=UCu1ZS9PqAJDStOS5EJiycEQ&autoplay=1&mute=1"></iframe></div>
                <div class="v-shell"><iframe src="https://www.youtube.com/embed/vvj64ZskM9Y?controls=0&mute=1&autoplay=1&loop=1"></iframe></div>
            </div>
            <div class="ticker-module">
                <div class="ticker-wrap">+++ ROBI-TWICE OFFICIAL MERCH DROP 2026 +++ LIMITED QUANTITY +++ WORLDWIDE SHIPPING +++ JOIN THE DISCORD +++</div>
            </div>
        </section>
    </main>

    <main id="view-shop" class="app-view">
        <section class="store-portal">
            <div class="portal-header">
                <h2>The Collection</h2>
            </div>
            <div class="grid-engine">
                <div class="product-node">
                    <div class="visual-container"><img src="tshirt.png" alt="Shirt"></div>
                    <h3 class="product-title">Signature Tee</h3>
                    <span class="price-tag">29,95 €</span>
                    <select id="size-1" class="size-ui"><option>Größe: S</option><option>Größe: M</option><option>Größe: L</option></select>
                    <button class="buy-trigger" onclick="engine.add('Signature Tee', 29.95, 'size-1')">Add to Cart</button>
                </div>
                <div class="product-node">
                    <div class="visual-container"><img src="hoodie.png" alt="Hoodie"></div>
                    <h3 class="product-title">Legacy Hoodie</h3>
                    <span class="price-tag">54,95 €</span>
                    <select id="size-2" class="size-ui"><option>Größe: S</option><option>Größe: M</option><option>Größe: L</option></select>
                    <button class="buy-trigger" onclick="engine.add('Legacy Hoodie', 54.95, 'size-2')">Add to Cart</button>
                </div>
            </div>
        </section>
    </main>

    <main id="view-cart" class="app-view">
        <section class="cart-wrapper">
            <div class="cart-container">
                <div class="cart-items-section">
                    <h2 style="font-size: 40px; margin-bottom: 40px;">Your Cart</h2>
                    <div id="cart-list-render"></div>
                    <div style="margin-top: 50px; border-top: 2px solid #111; padding-top: 30px;">
                        <h3>Total: <span id="cart-total-ui" style="color: var(--brand-green);">0,00 €</span></h3>
                    </div>
                </div>
                <div class="checkout-section">
                    <h2>Checkout</h2>
                    <form id="master-form" style="margin-top: 40px;">
                        <input type="text" name="name" placeholder="Full Name" class="input-form" required>
                        <input type="email" name="email" placeholder="Email" class="input-form" required>
                        <input type="text" name="address" placeholder="Shipping Address" class="input-form" required>
                        <input type="hidden" name="order_data" id="order-data-hidden">
                        <button type="submit" class="buy-trigger" style="background: white; color: black;">Complete to PayPal</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-logo-text">robi-twice</div>
        <p>&copy; 2026 ROBI-TWICE ENTERTAINMENT GROUP. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        const engine = {
            state: { cart: [] },
            init: () => console.log("System Online"),
            view: (id) => {
                document.querySelectorAll('.app-view').forEach(v => v.style.display = 'none');
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('view-' + id).style.display = 'block';
                if(document.getElementById('tab-' + id)) document.getElementById('tab-' + id).classList.add('active');
                window.scrollTo(0,0);
            },
            add: (name, price, sid) => {
                const size = document.getElementById(sid).value;
                engine.state.cart.push({name, price, size, id: Date.now()});
                engine.sync();
                alert(name + " added!");
            },
            remove: (id) => {
                engine.state.cart = engine.state.cart.filter(i => i.id !== id);
                engine.sync();
            },
            sync: () => {
                const list = document.getElementById('cart-list-render');
                const total = document.getElementById('cart-total-ui');
                const badge = document.getElementById('cart-count');
                badge.innerText = engine.state.cart.length;
                let sum = 0;
                let html = "";
                engine.state.cart.forEach(i => {
                    sum += i.price;
                    html += `<div class="cart-item-row">
                        <div><strong>${i.name}</strong><br><small>${i.size}</small></div>
                        <div>${i.price.toFixed(2)} € <button onclick="engine.remove(${i.id})" style="background:none; border:none; color:red; cursor:pointer; margin-left:15px;">X</button></div>
                    </div>`;
                });
                list.innerHTML = html || "Your cart is empty.";
                total.innerText = sum.toFixed(2).replace('.', ',') + " €";
                document.getElementById('order-data-hidden').value = JSON.stringify(engine.state.cart);
            }
        };

        document.getElementById('master-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(engine.state.cart.length === 0) return alert("Empty cart!");
            const formData = new FormData(e.target);
            await fetch('https://formspree.io/f/xlgpdoak', { method: 'POST', body: formData, headers: {'Accept': 'application/json'} });
            const total = engine.state.cart.reduce((a,b) => a + b.price, 0).toFixed(2);
            window.location.href = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=bananielheinrich@gmail.com&amount=${total}&currency_code=EUR&item_name=RobiTwiceOrder`;
        });
    </script>
</body>
</html>
