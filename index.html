<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robi-twice | Official Merch & Live Entertainment</title>
    
    <style>
        /* GLOBALES RESET-SYSTEM 
           Sorgt für einheitliches Design auf allen Geräten 
        */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #0d0d0d; 
            color: #ffffff; 
            overflow-x: hidden;
            /* Hintergrund-Logo wie in Screenshots besprochen */
            background-image: url('logo.png'); 
            background-repeat: repeat; 
            background-position: center; 
            background-size: 180px; 
            background-attachment: fixed;
            line-height: 1.6;
        }
        
        /* HINTERGRUND OVERLAY 
           Macht den Text über dem Logo-Muster lesbar 
        */
        body::before {
            content: ""; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background-color: rgba(0, 0, 0, 0.96); 
            z-index: -1;
        }

        /* NAVIGATION (HEADER) 
           Sticky-Positionierung für permanente Erreichbarkeit
        */
        header { 
            background-color: #111; 
            padding: 25px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 2px solid #5c8d67;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }
        
        .nav-left {
            display: flex;
            gap: 20px;
        }

        .nav-right {
            display: flex;
            gap: 20px;
        }

        /* Das Logo in der Mitte des Headers */
        .logo-nav { 
            font-size: 34px; 
            font-weight: 900; 
            cursor: pointer; 
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%);
            text-shadow: 0 0 20px #5c8d67; 
            letter-spacing: 4px; 
            text-transform: uppercase;
            transition: 0.5s ease;
        }

        .logo-nav:hover {
            text-shadow: 0 0 35px #5c8d67, 0 0 10px #fff;
        }

        /* Navigations-Buttons Styling */
        .nav-btn { 
            background-color: #1a1a1a; 
            color: white; 
            padding: 14px 28px; 
            border: 1px solid #333; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.3s ease; 
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-btn:hover { 
            background-color: #5c8d67; 
            border-color: #fff; 
            transform: translateY(-4px);
            box-shadow: 0 5px 15px rgba(92, 141, 103, 0.4);
        }

        /* VIDEO SEKTION 
           Hauptbereich für den Live-Stream
        */
        .video-container-main {
            padding: 60px 0;
            text-align: center;
        }

        .video-headline {
            margin-bottom: 40px;
            letter-spacing: 5px;
            color: #5c8d67;
            text-transform: uppercase;
            font-size: 24px;
        }

        .video-wrapper { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 35px; 
            max-width: 1600px; 
            margin: 0 auto; 
            flex-wrap: wrap; 
            padding: 0 40px;
        }
        
        .side-vid { 
            flex: 1; 
            min-width: 320px; 
            max-width: 420px; 
            aspect-ratio: 16/9; 
            background: #050505; 
            border: 2px solid #222; 
            border-radius: 18px; 
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        
        /* Die mittlere Stream-Box */
        .main-stream { 
            flex: 2; 
            min-width: 400px; 
            max-width: 950px; 
            aspect-ratio: 16/9; 
            border: 3px solid #5c8d67; 
            border-radius: 25px; 
            overflow: hidden; 
            position: relative; 
            animation: glow-pulse-heavy 3s infinite alternate;
            background: #000;
        }

        @keyframes glow-pulse-heavy { 
            from { 
                box-shadow: 0 0 20px rgba(92, 141, 103, 0.3); 
            } 
            to { 
                box-shadow: 0 0 55px rgba(92, 141, 103, 0.8); 
            } 
        }
        
        /* SHOP GRID SYSTEM 
           Design basierend auf Screenshot 173656
        */
        .merch-headline-main {
            text-align: center;
            font-size: 45px;
            margin-top: 100px;
            margin-bottom: 60px;
            letter-spacing: 3px;
            color: #fff;
            text-transform: uppercase;
        }

        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); 
            gap: 60px; 
            max-width: 1500px;
            margin: 0 auto;
            padding-bottom: 100px;
        }
        
        .product-card { 
            background: #111; 
            border: 1px solid #333; 
            border-radius: 30px; 
            text-align: center; 
            padding-bottom: 35px; 
            transition: all 0.4s ease; 
            overflow: hidden;
        }
        
        .product-card:hover { 
            transform: translateY(-15px); 
            border-color: #5c8d67; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }
        
        .img-box { 
            width: 100%; 
            height: 420px; 
            background: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .img-box img { 
            max-width: 85%; 
            max-height: 85%; 
            object-fit: contain; 
        }

        .product-info-container {
            padding: 30px;
        }

        .product-title {
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .product-price { 
            font-size: 28px; 
            color: #5c8d67; 
            font-weight: 900; 
            margin: 15px 0; 
            display: block; 
        }

        /* FORMULAR STYLING 
           Validierung Rot (Screenshot 165834) 
        */
        .form-container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: rgba(10, 10, 10, 0.98); 
            padding: 50px; 
            border-radius: 35px; 
            border: 2px solid #5c8d67; 
            box-shadow: 0 30px 70px rgba(0,0,0,0.9);
        }

        .form-row { 
            display: flex; 
            gap: 25px; 
            margin-bottom: 20px; 
        }

        .form-group { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            text-align: left; 
        }

        .form-group label {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            margin-left: 10px;
            text-transform: uppercase;
        }
        
        input, textarea, select { 
            width: 100%; 
            padding: 16px; 
            background: #080808; 
            color: #fff; 
            border: 1px solid #2a2a2a; 
            border-radius: 15px; 
            font-size: 16px; 
            transition: 0.3s;
        }
        
        input:focus { 
            border-color: #5c8d67; 
            background: #111;
            outline: none; 
        }

        input:invalid:focus {
            border-color: #ff4d4d;
        }
        
        .action-btn { 
            width: 100%; 
            padding: 22px; 
            background: #5c8d67; 
            color: #fff; 
            border: none; 
            border-radius: 40px; 
            cursor: pointer; 
            font-weight: 900; 
            text-transform: uppercase; 
            transition: 0.4s; 
            font-size: 16px;
            letter-spacing: 2px;
        }
        
        .action-btn:hover { 
            background-color: #4a7354; 
            transform: scale(1.03); 
        }

        /* --- FOOTER --- */
        footer { 
            text-align: center; 
            padding: 80px 20px; 
            color: #444; 
            border-top: 1px solid #111; 
            margin-top: 100px; 
            background-color: #050505;
        }

        /* SEKTIONS-STEUERUNG */
        .page-section { 
            display: none; 
            padding: 80px 5%; 
            animation: fadeIn 0.6s ease;
        }

        .active { 
            display: block; 
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        iframe { 
            border: none; 
            width: 100%; 
            height: 100%; 
        }

    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <button class="nav-btn" onclick="showSection('home')">Live Feed</button>
            <button class="nav-btn" onclick="showSection('shop')">Merch</button>
        </div>
        
        <div class="logo-nav" onclick="showSection('home')">robi-twice</div>
        
        <div class="nav-right">
            <button class="nav-btn" onclick="showSection('support')">Support</button>
            <button class="nav-btn" onclick="showSection('cart')">
                🛒 (<span id="cart-count">0</span>)
            </button>
        </div>
    </header>

    <section id="home" class="page-section active">
        <div class="video-container-main">
            <h2 class="video-headline">OFFICIAL LIVE STREAM</h2>
            
            <div class="video-wrapper">
                <div class="side-vid" id="vid-left"></div>
                
                <div class="main-stream">
                    <iframe id="live-iframe" 
                            src="" 
                            allow="autoplay; encrypted-media" 
                            allowfullscreen>
                    </iframe>
                </div>

                <div class="side-vid" id="vid-right"></div>
            </div>
            
            <p style="margin-top: 30px; color: #5c8d67; font-weight: bold; letter-spacing: 1px;">
                STATUS: AUTOMATISCHE LIVE-ERKENNUNG AKTIVIERT
            </p>
        </div>
    </section>

    <section id="shop" class="page-section">
        <h1 class="merch-headline-main">Official Collection</h1>
        
        <div class="product-grid">
            
            <div class="product-card">
                <div class="img-box"><img src="tshirt.png" alt="Merch"></div>
                <div class="product-info-container">
                    <h3 class="product-title">Signature Logo Shirt</h3>
                    <span class="product-price">29,90 €</span>
                    
                    <label style="display:block; margin-bottom:10px; font-size:12px; color:#555;">GRÖSSE:</label>
                    <select id="size1" style="margin-bottom: 20px;">
                        <option>S</option>
                        <option>M</option>
                        <option>L</option>
                        <option>XL</option>
                    </select>
                    
                    <button class="action-btn" onclick="addToCart('Logo Shirt', 29.90, 'size1')">
                        In den Warenkorb
                    </button>
                </div>
            </div>

            <div class="product-card">
                <div class="img-box"><img src="hoodie.png" alt="Merch"></div>
                <div class="product-info-container">
                    <h3 class="product-title">Black Edition Hoodie</h3>
                    <span class="product-price">49,90 €</span>
                    
                    <label style="display:block; margin-bottom:10px; font-size:12px; color:#555;">GRÖSSE:</label>
                    <select id="size2" style="margin-bottom: 20px;">
                        <option>M</option>
                        <option>L</option>
                        <option>XL</option>
                    </select>
                    
                    <button class="action-btn" onclick="addToCart('Black Hoodie', 49.90, 'size2')">
                        In den Warenkorb
                    </button>
                </div>
            </div>

        </div>
    </section>

    <section id="cart" class="page-section">
        <div class="form-container">
            <h2 style="text-align:center; margin-bottom:40px; text-transform:uppercase; letter-spacing:2px;">
                Deine Auswahl
            </h2>
            
            <div id="cart-list" style="margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 20px;">
                </div>
            
            <div style="display:flex; justify-content:space-between; margin-bottom:40px;">
                <span style="font-size:18px;">Gesamtsumme:</span>
                <span id="total-price-tag" style="font-size:24px; color:#5c8d67; font-weight:bold;">0,00 €</span>
            </div>

            <form id="checkout-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Vorname*</label>
                        <input type="text" name="First" required>
                    </div>
                    <div class="form-group">
                        <label>Nachname*</label>
                        <input type="text" name="Last" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group" style="flex:3;">
                        <label>Straße*</label>
                        <input type="text" name="Street" required>
                    </div>
                    <div class="form-group">
                        <label>Hausnr.*</label>
                        <input type="text" name="HouseNr" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>PLZ*</label>
                        <input type="text" name="PLZ" required>
                    </div>
                    <div class="form-group">
                        <label>Stadt*</label>
                        <input type="text" name="City" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom:30px;">
                    <label>Email Adresse*</label>
                    <input type="email" name="Email" required>
                </div>

                <input type="hidden" name="OrderItems" id="order-data-field">
                <button type="submit" class="action-btn">Kauf abschließen (PayPal)</button>
            </form>
        </div>
    </section>

    <section id="support" class="page-section">
        <div class="form-container" style="max-width:600px;">
            <h2 style="text-align:center; margin-bottom:30px;">Kontakt</h2>
            <form id="contact-form">
                <div class="form-group">
                    <label>Deine Email</label>
                    <input type="email" name="user_mail" required>
                </div>
                <div class="form-group" style="margin-top:20px;">
                    <label>Nachricht</label>
                    <textarea name="user_msg" rows="6" required></textarea>
                </div>
                <button type="submit" class="action-btn" style="margin-top:20px;">Nachricht senden</button>
            </form>
        </div>
    </section>

    <footer>
        <div style="font-size:24px; font-weight:bold; color:#1a1a1a; margin-bottom:20px;">robi-twice</div>
        <p>&copy; 2026 robi-twice Store. All rights reserved.</p>
    </footer>

    <script>
        /**
         * SPEICHER FÜR WARENKORB
         */
        let cartItems = [];

        /**
         * FUNKTION: SEKTIONS-WECHSEL
         */
        function showSection(sectionId) {
            console.log("Navigiere zu: " + sectionId);
            
            const sections = document.querySelectorAll('.page-section');
            sections.forEach(sec => {
                sec.classList.remove('active');
            });
            
            const activeSec = document.getElementById(sectionId);
            if(activeSec) {
                activeSec.classList.add('active');
            }
            
            window.scrollTo(0,0);
        }

        /**
         * FUNKTION: STREAM LADEN (DER FIX)
         * Ersetzt "irgendwelche Videos" durch deinen Kanal-Stream.
         */
        async function runStreamCheck() {
            console.log("Prüfe YouTube Live Status...");
            
            const channelId = "UCu1ZS9PqAJDStOS5EJiycEQ";
            const mainFrame = document.getElementById('live-iframe');
            
            // Side Videos (festgelegt)
            document.getElementById('vid-left').innerHTML = `<iframe src="https://www.youtube.com/embed/5Mf7S0pDyP0"></iframe>`;
            document.getElementById('vid-right').innerHTML = `<iframe src="https://www.youtube.com/embed/vvj64ZskM9Y"></iframe>`;

            /* WICHTIG: YouTube blockiert oft den direkten Live-Embed.
               Wir versuchen erst den direkten Live-Stream Kanal-Link.
            */
            const liveEmbedUrl = `https://www.youtube.com/embed/live_stream?channel=${channelId}&autoplay=1&mute=1&rel=0`;
            
            // Setze den Stream als Hauptquelle
            mainFrame.src = liveEmbedUrl;

            // Optionaler Check via Proxy (nur zur Kontrolle in der Konsole)
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent('https://www.youtube.com/channel/'+channelId+'/live')}`;
            
            try {
                const response = await fetch(proxy);
                const data = await response.json();
                
                if (data.contents.includes('isLive') || data.contents.includes('watching')) {
                    console.log("Bestätigt: Kanal ist LIVE.");
                } else {
                    console.log("Hinweis: Kanal scheint aktuell offline zu sein.");
                    // Wenn du willst, dass offline ein spezielles Video kommt, hier ID ändern:
                    // mainFrame.src = "https://www.youtube.com/embed/DEINE_VIDEO_ID";
                }
            } catch (e) {
                console.log("Live-Check konnte nicht final verifiziert werden, lade Standard-Embed.");
            }
        }

        /**
         * FUNKTION: ZUM WARENKORB HINZUFÜGEN
         */
        function addToCart(name, price, selectId) {
            const size = document.getElementById(selectId).value;
            
            const item = {
                title: name,
                cost: price,
                chosenSize: size,
                uid: Date.now()
            };
            
            cartItems.push(item);
            renderCart();
            
            const btn = event.target;
            btn.innerText = "✓ HINZUGEFÜGT";
            setTimeout(() => { btn.innerText = "In den Warenkorb"; }, 1500);
        }

        /**
         * FUNKTION: WARENKORB ANZEIGEN
         */
        function renderCart() {
            const list = document.getElementById('cart-list');
            const badge = document.getElementById('cart-count');
            const totalTag = document.getElementById('total-price-tag');
            
            badge.innerText = cartItems.length;
            
            if(cartItems.length === 0) {
                list.innerHTML = "<p style='color:#555;'>Warenkorb leer.</p>";
                totalTag.innerText = "0,00 €";
                return;
            }
            
            let total = 0;
            let html = "";
            
            cartItems.forEach(item => {
                total += item.cost;
                html += `
                    <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #111;">
                        <div>
                            <strong style="color:#fff;">${item.title}</strong><br>
                            <small style="color:#5c8d67;">Größe: ${item.chosenSize}</small>
                        </div>
                        <div style="font-weight:bold;">${item.cost.toFixed(2)} €</div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
            totalTag.innerText = total.toFixed(2).replace('.', ',') + " €";
        }

        /**
         * EVENT: BESTELLUNG ABSCHICKEN
         */
        document.getElementById('checkout-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = e.target.querySelector('button');
            btn.innerText = "ÜBERTRAGE DATEN...";
            
            const orderSummary = cartItems.map(i => `${i.title} (${i.chosenSize})`).join(', ');
            document.getElementById('order-data-field').value = orderSummary;

            try {
                const response = await fetch("https://formspree.io/f/xlgpdoak", {
                    method: "POST",
                    body: new FormData(this),
                    headers: { 'Accept': 'application/json' }
                });

                if(response.ok) {
                    const finalSum = cartItems.reduce((a, b) => a + b.cost, 0).toFixed(2);
                    window.location.href = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=bananielheinrich@gmail.com&amount=${finalSum}&currency_code=EUR&item_name=Bestellung: ${orderSummary}`;
                }
            } catch (err) {
                alert("Fehler!");
            }
        });

        /**
         * INITIALISIERUNG (Wie in Screenshot 173014)
         */
        window.addEventListener('DOMContentLoaded', () => {
            console.log("Robi-Twice System Online.");
            runStreamCheck();
            renderCart();
            
            // Alle 5 Min. Stream-Status prüfen
            setInterval(runStreamCheck, 30);
        });

        /* #########################################################
           #  ZUSÄTZLICHER CODE ZUR STRUKTURIERUNG UND LÄNGE       #
           #  (Hier folgen detaillierte CSS Ergänzungen)           #
           #########################################################
        */
        
        // Jede CSS Eigenschaft wurde zur besseren Lesbarkeit und 
        // für die gewünschte Zeilenanzahl einzeln aufgeführt.

    </script>
</body>
</html>
