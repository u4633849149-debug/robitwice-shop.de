<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROBI-TWICE | LIVE HUB 2026</title>

    <style>
        :root {
            --color-primary-green: #5c8d67;
            --color-bg-base: #000000; 
            --color-bg-card: #050505; 
            --color-text-main: #ffffff;
            --header-height: 100px;
            --radius-lg: 30px;
            --radius-md: 15px;
            --anim-curve: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--color-bg-base);
            color: var(--color-text-main);
            font-family: 'Inter', sans-serif;
            background-image: url('logo.png');
            background-repeat: repeat;
            background-size: 160px;
            background-attachment: fixed;
        }

        .page-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.94) 0%, rgba(0,0,0,1) 100%);
            z-index: -1;
        }

        header {
            height: var(--header-height);
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 2px solid var(--color-primary-green);
            display: flex; align-items: center; justify-content: space-between; padding: 0 5%;
        }

        .brand-title { font-size: 32px; font-weight: 900; text-transform: uppercase; letter-spacing: 12px; cursor: pointer; flex: 1; text-align: center; }

        .btn-action {
            background: #0a0a0a; border: 1px solid #1a1a1a; color: white; padding: 12px 24px;
            border-radius: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .btn-action.active { background: var(--color-primary-green); border-color: white; }

        .view-container { display: none; padding: 40px 5%; animation: fadeIn 0.6s var(--anim-curve); }

        /* LIVE MATRIX */
        .video-triple-grid {
            display: grid;
            grid-template-columns: 1fr 3fr 1fr; /* Mitte extra breit für den Stream */
            gap: 20px;
            max-width: 1800px;
            margin: 0 auto;
            align-items: center;
        }

        .v-box {
            aspect-ratio: 16/9;
            background: black;
            border-radius: var(--radius-md);
            border: 1px solid #111;
            overflow: hidden;
            transition: 0.5s;
        }

        .v-box.main {
            border: 3px solid var(--color-primary-green);
            box-shadow: 0 0 60px rgba(92, 141, 103, 0.3);
            border-radius: var(--radius-lg);
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* TICKER */
        .ticker-bar {
            width: 100%; background: var(--color-primary-green); padding: 15px 0;
            margin-top: 40px; overflow: hidden;
        }
        .ticker-text {
            display: inline-block; font-weight: 900; text-transform: uppercase;
            letter-spacing: 5px; animation: scroll 25s linear infinite;
        }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* STORE */
        .product-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; max-width: 1400px; margin: 0 auto;
        }
        .product-card {
            background: var(--color-bg-card); padding: 30px; border-radius: var(--radius-lg);
            text-align: center; border: 1px solid #111;
        }
        .img-wrap { height: 300px; background: white; border-radius: 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; }
        .img-wrap img { max-width: 80%; }
        .price { font-size: 28px; color: var(--color-primary-green); font-weight: 900; margin: 15px 0; display: block; }
        .btn-buy { width: 100%; padding: 15px; background: var(--color-primary-green); border: none; border-radius: 10px; color: white; font-weight: 900; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 1000px) {
            .video-triple-grid { grid-template-columns: 1fr; }
            .v-box:not(.main) { display: none; }
        }
    </style>
</head>
<body onload="engine.init()">

    <div class="page-overlay"></div>

    <header>
        <div style="display: flex; gap: 15px;">
            <button class="btn-action active" id="btn-home" onclick="engine.view('home')">Live</button>
            <button class="btn-action" id="btn-shop" onclick="engine.view('shop')">Store</button>
        </div>
        <div class="brand-title" onclick="engine.view('home')">robi-twice</div>
        <div style="display: flex; justify-content: flex-end;">
            <button class="btn-action" id="btn-cart" onclick="engine.view('cart')">Cart (<span id="cart-count">0</span>)</button>
        </div>
    </header>

    <section id="view-home" class="view-container" style="display: block;">
        <div class="video-triple-grid">
            <div class="v-box">
                <iframe src="https://www.youtube.com/embed?listType=user_uploads&user=UCu1ZS9PqAJDStOS5EJiycEQ&mute=1"></iframe>
            </div>

            <div class="v-box main">
                <iframe 
                    src="https://www.youtube.com/embed/live_stream?channel=UCu1ZS9PqAJDStOS5EJiycEQ&autoplay=1&mute=0" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>
            </div>

            <div class="v-box">
                <iframe src="https://www.youtube.com/embed/5Mf7S0pDyP0?mute=1&loop=1"></iframe>
            </div>
        </div>

        <div class="ticker-bar">
            <div class="ticker-text">+++ LIVE ON YOUTUBE +++ NEW MERCH DROP IN STORE +++ ROBI-TWICE OFFICIAL HUB 2026 +++</div>
        </div>
    </section>

    <section id="view-shop" class="view-container">
        <div class="product-grid">
            <div class="product-card">
                <div class="img-wrap"><img src="tshirt.png" alt="Tee"></div>
                <h3>Signature Tee</h3>
                <span class="price">29,95 €</span>
                <button class="btn-buy" onclick="engine.add('Signature Tee', 29.95)">Add to Cart</button>
            </div>
            <div class="product-card">
                <div class="img-wrap"><img src="hoodie.png" alt="Hoodie"></div>
                <h3>Legacy Hoodie</h3>
                <span class="price">54,95 €</span>
                <button class="btn-buy" onclick="engine.add('Legacy Hoodie', 54.95)">Add to Cart</button>
            </div>
        </div>
    </section>

    <script>
        const engine = {
            cart: [],
            init: () => console.log("Engine Ready"),
            view: (id) => {
                document.querySelectorAll('.view-container').forEach(v => v.style.display = 'none');
                document.querySelectorAll('.btn-action').forEach(b => b.classList.remove('active'));
                document.getElementById('view-' + id).style.display = 'block';
                if(document.getElementById('btn-' + id)) document.getElementById('btn-' + id).classList.add('active');
            },
            add: (name, price) => {
                engine.cart.push({name, price});
                document.getElementById('cart-count').innerText = engine.cart.length;
                alert(name + " im Warenkorb!");
            }
        };
    </script>
</body>
</html>
